<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Brasil Curioso</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a1f3c;font-family:Georgia,'Times New Roman',serif;color:#fff;min-height:100vh}
button,input{font-family:Georgia,serif}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* HOME */
#home{background:linear-gradient(150deg,#0a2342,#1b4332);align-items:center;justify-content:center;padding:32px 20px;gap:18px}
.home-flag{font-size:56px;text-align:center}
.home-title{color:#ffd700;font-size:32px;font-weight:bold;letter-spacing:1px;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,.5)}
.home-sub{color:#a8d5b5;font-size:13px;text-align:center;letter-spacing:.5px}
.home-card{background:rgba(255,255,255,.08);border-radius:18px;padding:24px;border:1px solid rgba(255,215,0,.2);width:100%;max-width:400px}
.home-label{color:#ffd700;font-size:12px;font-weight:bold;letter-spacing:1px;margin-bottom:8px}
.name-input{width:100%;padding:13px 16px;border-radius:12px;border:2px solid rgba(255,215,0,.35);background:rgba(255,255,255,.1);color:#fff;font-size:15px;outline:none}
.name-input::placeholder{color:rgba(255,255,255,.35)}
.btn-start{margin-top:12px;width:100%;padding:15px;border-radius:12px;background:linear-gradient(135deg,#009c3b,#c8a400);color:#0a2342;font-weight:bold;font-size:17px;border:none;cursor:pointer;letter-spacing:.5px}
.tag-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.tag{background:rgba(255,255,255,.1);border-radius:20px;padding:5px 13px;color:#a8d5b5;font-size:12px}
.btn-rank-home{background:transparent;border:1px solid rgba(255,215,0,.35);border-radius:10px;color:#ffd700;padding:9px 22px;font-size:13px;cursor:pointer}

/* GAME */
#game{background:linear-gradient(150deg,#0a2342,#0d3b2a)}
.g-header{display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid rgba(255,255,255,.08)}
.btn-home-ic{background:transparent;border:none;color:rgba(255,255,255,.55);font-size:22px;cursor:pointer;padding:3px;line-height:1}
.btn-home-ic:hover{color:#fff}
.g-prog-wrap{flex:1;height:4px;background:rgba(255,255,255,.12);border-radius:99px}
.g-prog{height:100%;background:linear-gradient(90deg,#009c3b,#ffd700);border-radius:99px;transition:width .35s}
.g-score-box{display:flex;align-items:center;gap:8px;font-size:13px;color:#ffd700;min-width:72px;justify-content:flex-end}
.g-streak-lbl{color:#ff7043;font-size:12px}
.g-body{flex:1;padding:15px;display:flex;flex-direction:column;gap:11px;overflow-y:auto}
.q-count{font-size:11px;color:rgba(255,255,255,.4)}

/* TIMER */
.timer-row{display:flex;align-items:center;gap:10px;position:relative}
.timer-ico{font-size:16px;color:rgba(255,255,255,.4)}
.timer-wrap{flex:1;height:8px;background:rgba(255,255,255,.12);border-radius:99px;overflow:visible;position:relative}
.timer-fill{height:100%;border-radius:99px;transition:width .1s linear,background .5s;position:relative}
.timer-num{font-size:13px;font-weight:bold;min-width:28px;text-align:right}


/* BADGES */
.badges-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.diff-badge{display:inline-block;border-radius:20px;padding:3px 11px;font-size:11px;font-weight:bold;letter-spacing:.5px}
.d-easy{background:rgba(0,156,59,.2);color:#5dca85;border:1px solid rgba(0,156,59,.3)}
.d-medium{background:rgba(255,160,0,.15);color:#ffc040;border:1px solid rgba(255,160,0,.3)}
.d-hard{background:rgba(220,60,60,.2);color:#ff7070;border:1px solid rgba(220,60,60,.3)}
.cat-badge{display:inline-block;border-radius:20px;padding:3px 11px;font-size:11px;font-weight:bold;color:#fff}
.type-lbl{font-size:11px;color:rgba(255,255,255,.45)}

.q-card{background:rgba(255,255,255,.07);border-radius:16px;padding:18px;border:1px solid rgba(255,255,255,.1)}
.q-txt{font-size:17px;line-height:1.65;color:#fff;font-weight:bold}

.tf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ans-btn{padding:14px 12px;border-radius:13px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#fff;font-size:14px;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:10px}
.ans-btn:hover:not(:disabled){background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3)}
.ans-btn:disabled{cursor:default}
.mc-list{display:flex;flex-direction:column;gap:8px}
.mc-letter{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.ans-correct{background:rgba(0,156,59,.25)!important;border:2px solid #009c3b!important}
.ans-wrong{background:rgba(220,50,50,.25)!important;border:2px solid #dc3232!important}
.ml-correct{background:#009c3b!important}
.exp-box{border-radius:13px;padding:14px}
.exp-ok{background:rgba(0,156,59,.13);border:1px solid rgba(0,156,59,.35)}
.exp-bad{background:rgba(220,50,50,.13);border:1px solid rgba(220,50,50,.35)}
.exp-title{font-size:13px;font-weight:bold;margin-bottom:6px}
.exp-text{font-size:13px;line-height:1.6;color:rgba(255,255,255,.72)}
.btn-next{padding:14px;border-radius:13px;background:linear-gradient(135deg,#009c3b,#007a2f);color:#fff;font-weight:bold;font-size:15px;border:none;cursor:pointer;text-align:center}

/* RESULT */
#result{background:linear-gradient(150deg,#0a2342,#1b4332);align-items:center;justify-content:center;padding:32px 20px;gap:14px}
.res-medal{font-size:64px;text-align:center}
.res-title{color:#ffd700;font-size:26px;font-weight:bold;text-align:center}
.res-sub{color:#a8d5b5;font-size:14px;text-align:center}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px}
.res-cell{background:rgba(255,255,255,.07);border-radius:13px;padding:14px;text-align:center;border:1px solid rgba(255,255,255,.1)}
.res-icon{font-size:20px}
.res-val{color:#ffd700;font-size:20px;font-weight:bold;margin:3px 0}
.res-lbl{color:rgba(255,255,255,.45);font-size:11px}
.res-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;max-width:360px}
.btn-again{padding:12px 24px;border-radius:12px;background:linear-gradient(135deg,#009c3b,#c8a400);color:#0a2342;font-weight:bold;border:none;cursor:pointer;font-size:14px}
.btn-rank-r{padding:12px 24px;border-radius:12px;background:rgba(255,215,0,.12);color:#ffd700;border:1px solid rgba(255,215,0,.35);cursor:pointer;font-size:14px}

/* RANKING */
#ranking{background:linear-gradient(150deg,#0a2342,#1b4332);padding:20px;flex:1}
.rank-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.btn-back{background:transparent;border:none;color:#ffd700;font-size:22px;cursor:pointer;padding:3px}
.rank-title{color:#ffd700;font-size:22px;font-weight:bold}
.rank-row{display:flex;align-items:center;gap:12px;border-radius:13px;padding:12px 14px;margin-bottom:8px}
.rk-gold{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.35)}
.rk-silver{background:rgba(192,192,192,.07);border:1px solid rgba(255,255,255,.1)}
.rk-bronze{background:rgba(205,127,50,.07);border:1px solid rgba(255,255,255,.08)}
.rk-normal{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.rank-pos{font-size:22px;min-width:32px;text-align:center}
.rank-name{font-weight:bold;font-size:14px;color:#fff}
.rank-detail{font-size:11px;color:rgba(255,255,255,.45)}
.rank-pts{font-weight:bold;color:#ffd700;font-size:18px;margin-left:auto}
.rank-status{color:rgba(255,255,255,.4);text-align:center;padding:28px;font-size:13px}

/* CONQUISTA */
.ach-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#0a2342;border:2px solid #ffd700;border-radius:16px;padding:13px 20px;
  display:flex;align-items:center;gap:12px;min-width:240px;z-index:999;
  opacity:0;transition:opacity .3s;pointer-events:none}
.ach-toast.show{opacity:1}
.ach-ic{font-size:24px}
.ach-unlock{color:#ffd700;font-size:11px;font-weight:bold}
.ach-name{font-size:13px;font-weight:bold;color:#fff}
.ach-desc{font-size:11px;color:rgba(255,255,255,.5)}

/* BOLHAS */
#bubble-wrap{position:relative;height:28px;overflow:visible;pointer-events:none}
.bubble{position:absolute;bottom:0;border-radius:50%;border:1.5px solid rgba(100,200,255,0.7);background:rgba(100,200,255,0.12);opacity:0}
@keyframes bubbleRise{
  0%  {transform:translateY(0) scale(1);opacity:.8}
  70% {opacity:.5}
  100%{transform:translateY(-30px) scale(1.15);opacity:0}
}
@keyframes bubbleBurst{
  0%  {transform:translateY(0) scale(0.5);opacity:1}
  50% {transform:translateY(-22px) scale(1.4);opacity:.8}
  100%{transform:translateY(-52px) scale(2);opacity:0}
}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-flag">🇧🇷</div>
  <h1 class="home-title">Brasil Curioso</h1>
  <p class="home-sub">20 perguntas · história · natureza · cultura</p>
  <div class="home-card">
    <p class="home-label">SEU NOME</p>
    <input id="name-in" class="name-input" type="text" maxlength="28" placeholder="Como quer ser chamado?">
    <button class="btn-start" onclick="startGame()">Explorar o Brasil →</button>
  </div>
  <div class="tag-row">
    <span class="tag">🌿 Natureza</span>
    <span class="tag">🏛️ História</span>
    <span class="tag">🎶 Cultura</span>
    <span class="tag">⏱️ Timer</span>
    <span class="tag">⭐ Dificuldade</span>
    <span class="tag">🌎 Ranking Global</span>
  </div>
  <button class="btn-rank-home" onclick="showRanking()">🏆 Ranking Global</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="g-header">
    <button class="btn-home-ic" onclick="confirmHome()" title="Voltar ao início">🏠</button>
    <div class="g-prog-wrap"><div class="g-prog" id="g-prog" style="width:0%"></div></div>
    <div class="g-score-box">
      <span id="g-streak" class="g-streak-lbl"></span>
      <span id="g-score">0</span>
      <span style="color:rgba(255,215,0,.5);font-size:11px">pts</span>
    </div>
  </div>
  <div class="g-body">
    <div class="q-count" id="q-count"></div>

    <!-- BOLHAS + TIMER -->
    <div id="bubble-wrap" aria-hidden="true"></div>
    <div class="timer-row">
      <span class="timer-ico">⏱</span>
      <div class="timer-wrap"><div class="timer-fill" id="t-bar" style="width:100%;background:#009c3b"></div></div>
      <span class="timer-num" id="t-val" style="color:#a8d5b5"></span>
    </div>

    <div class="badges-row">
      <span class="diff-badge" id="diff-b"></span>
      <span class="cat-badge" id="cat-b"></span>
      <span class="type-lbl" id="type-lbl"></span>
    </div>
    <div class="q-card"><p class="q-txt" id="q-txt"></p></div>
    <div id="tf-area" class="tf-grid" style="display:none">
      <button class="ans-btn" id="tf-true" onclick="answerTF(true)">✅ Verdadeiro</button>
      <button class="ans-btn" id="tf-false" onclick="answerTF(false)">❌ Falso</button>
    </div>
    <div id="mc-area" class="mc-list" style="display:none"></div>
    <div id="exp-box" class="exp-box" style="display:none">
      <div class="exp-title" id="exp-title"></div>
      <div class="exp-text" id="exp-text"></div>
    </div>
    <button class="btn-next" id="btn-next" style="display:none" onclick="nextQuestion()">Próxima →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="res-medal" id="res-medal"></div>
  <div class="res-title">Missão Concluída!</div>
  <div class="res-sub" id="res-sub"></div>
  <div class="res-grid">
    <div class="res-cell"><div class="res-icon">⭐</div><div class="res-val" id="r-score"></div><div class="res-lbl">Pontuação</div></div>
    <div class="res-cell"><div class="res-icon">✅</div><div class="res-val" id="r-corr"></div><div class="res-lbl">Acertos</div></div>
    <div class="res-cell"><div class="res-icon">🎯</div><div class="res-val" id="r-pct"></div><div class="res-lbl">Precisão</div></div>
    <div class="res-cell"><div class="res-icon">🔥</div><div class="res-val" id="r-streak"></div><div class="res-lbl">Maior sequência</div></div>
  </div>
  <div class="res-btns">
    <button class="btn-again" onclick="playAgain()">Jogar novamente</button>
    <button class="btn-rank-r" onclick="showRanking()">🏆 Ranking Global</button>
  </div>
</div>

<!-- RANKING -->
<div id="ranking" class="screen">
  <div class="rank-head">
    <button class="btn-back" onclick="showScreen('home')">←</button>
    <div class="rank-title">🏆 Ranking Global</div>
  </div>
  <div id="rank-list"><div class="rank-status">Carregando...</div></div>
</div>

<!-- CONQUISTA TOAST -->
<div class="ach-toast" id="ach-toast">
  <div class="ach-ic" id="ach-ic"></div>
  <div>
    <div class="ach-unlock">Conquista desbloqueada!</div>
    <div class="ach-name" id="ach-name"></div>
    <div class="ach-desc" id="ach-desc"></div>
  </div>
</div>

<script>
// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyCbXi3UCVl8oLleBzGb6DqWSxbZmZU2yDQ",
  authDomain: "jogos-ranking.firebaseapp.com",
  projectId: "jogos-ranking",
  storageBucket: "jogos-ranking.firebasestorage.app",
  messagingSenderId: "958784915420",
  appId: "1:958784915420:web:4212d3ad278f02d600f119"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const GAME_ID = "brasil-curioso";
const scoresRef = () => db.collection("games").doc(GAME_ID).collection("scores");

async function saveToFirebase(entry) {
  try {
    await scoresRef().add({
      name: entry.name,
      score: entry.score,
      correct: entry.correct,
      total: entry.total,
      maxStreak: entry.maxStreak,
      date: entry.date,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(e) {
    console.warn("Firebase save error:", e);
  }
}

async function loadFromFirebase() {
  try {
    const snap = await scoresRef().orderBy("score","desc").limit(20).get();
    return snap.docs.map(d => d.data());
  } catch(e) {
    console.warn("Firebase load error:", e);
    return [];
  }
}

// ===== DADOS =====
const TOTAL_QS = 20;
const DIFF_TIME = {easy:20, medium:15, hard:10};
const DIFF_PTS  = {easy:10, medium:15, hard:25};
const DIFF_LABEL= {easy:"Fácil ★", medium:"Médio ★★", hard:"Difícil ★★★"};
const CAT_COLORS= {"Origem":"#2d6a4f","Colonização":"#8b4513","Política":"#1a3a6b","Natureza":"#2d6a4f","História":"#5c3317","Cultura":"#9b2335","Fauna":"#4a7c59","Território":"#1b7a8e","Indígenas":"#c27d38","Fronteiras":"#4a4a8a","Capitais":"#8b3a62","Economia":"#3d5a80","Ciência":"#0a4d68","Saúde":"#b5283e","Religião":"#7b5ea7","Arquitetura":"#c47e2b","Esporte":"#016301","Arte":"#c45c26","Água":"#0077b6","Música":"#6a0572","Identidade":"#c9a227"};

const QUESTIONS=[
  {id:1,type:"tf",cat:"Origem",diff:"easy",q:"O nome 'Brasil' vem da madeira pau-brasil, explorada pelos portugueses pelo seu pigmento vermelho.",ans:true,exp:"Exato. O pau-brasil (Caesalpinia echinata) tinha madeira avermelhada como brasa. Os portugueses chamaram-na de 'brasil' e o nome foi transferido para a terra."},
  {id:2,type:"tf",cat:"Colonização",diff:"easy",q:"Pedro Álvares Cabral chegou ao Brasil em 22 de abril de 1500.",ans:true,exp:"Correto. A frota de Cabral avistou o Monte Pascoal no litoral baiano em 22 de abril de 1500."},
  {id:3,type:"tf",cat:"Política",diff:"medium",q:"Deodoro da Fonseca foi o primeiro presidente civil do Brasil.",ans:false,exp:"Errado. Deodoro era marechal do Exército. O primeiro presidente civil foi Prudente de Morais (1894–1898)."},
  {id:4,type:"tf",cat:"Natureza",diff:"easy",q:"O Rio Amazonas é o maior do mundo em volume de água.",ans:true,exp:"Correto. O Amazonas carrega cerca de 20% de toda a água doce que vai para os oceanos no mundo."},
  {id:5,type:"tf",cat:"Natureza",diff:"easy",q:"A vitória-régia é o símbolo floral da Amazônia.",ans:true,exp:"Sim. A vitória-régia (Victoria amazonica) é ícone da Amazônia, com folhas que chegam a 3 metros de diâmetro."},
  {id:6,type:"tf",cat:"História",diff:"medium",q:"A Guerra dos Farrapos durou 10 anos e foi a guerra civil mais longa do Brasil.",ans:true,exp:"Correto. A Revolução Farroupilha (1835–1845) durou exatamente 10 anos, a guerra civil mais longa da história brasileira."},
  {id:7,type:"tf",cat:"Cultura",diff:"medium",q:"O carnaval brasileiro tem origem totalmente indígena.",ans:false,exp:"Errado. O carnaval tem origem europeia (entrudo português) com forte influência africana. Indígenas não têm relação direta com a festa."},
  {id:8,type:"tf",cat:"Fauna",diff:"easy",q:"A onça-pintada é o maior felino das Américas.",ans:true,exp:"Correto. A onça-pintada (Panthera onca) pode pesar até 120 kg e é o maior felino do continente americano."},
  {id:9,type:"tf",cat:"História",diff:"easy",q:"O Brasil foi o último país das Américas a abolir a escravidão.",ans:true,exp:"Sim. A Lei Áurea foi assinada em 13 de maio de 1888, tornando o Brasil o último do continente a abolir a escravidão."},
  {id:10,type:"tf",cat:"Território",diff:"easy",q:"O Brasil é o maior país da América do Sul e o quinto maior do mundo.",ans:true,exp:"Correto. Com 8,5 milhões de km², o Brasil só perde para Rússia, Canadá, EUA e China."},
  {id:11,type:"tf",cat:"Indígenas",diff:"medium",q:"Os Tupinambá eram o grupo indígena mais numeroso no litoral quando os portugueses chegaram.",ans:true,exp:"Sim. Os Tupinambá dominavam grande parte do litoral e foram os primeiros a ter contato intenso com os colonizadores."},
  {id:12,type:"tf",cat:"Política",diff:"easy",q:"A capital do Brasil sempre foi Brasília.",ans:false,exp:"Errado. Salvador foi a primeira capital (1549–1763), depois Rio de Janeiro (1763–1960). Brasília só em 1960."},
  {id:13,type:"tf",cat:"Ciência",diff:"hard",q:"A Amazônia produz 20% do oxigênio da Terra.",ans:false,exp:"Mito. Florestas maduras consomem tanto quanto produzem. Saldo líquido próximo de zero. O oxigênio líquido vem do fitoplâncton oceânico."},
  {id:14,type:"tf",cat:"Fauna",diff:"hard",q:"O boto-cor-de-rosa vive principalmente no Pantanal.",ans:false,exp:"Errado. O boto-cor-de-rosa é da bacia amazônica e do Orinoco. O golfinho pantaneiro é o boto-cinza (Sotalia fluviatilis)."},
  {id:15,type:"tf",cat:"Natureza",diff:"easy",q:"A Mata Atlântica já foi destruída em mais de 85% de sua área original.",ans:true,exp:"Tragicamente correto. Restam menos de 12% da cobertura original. Mesmo assim, abriga 70% das espécies ameaçadas do Brasil."},
  {id:16,type:"tf",cat:"Natureza",diff:"medium",q:"O Cerrado é o segundo maior bioma do Brasil.",ans:true,exp:"Correto. O Cerrado ocupa ~24% do Brasil — 2 milhões de km². Um dos 25 hotspots de biodiversidade do mundo."},
  {id:17,type:"tf",cat:"Economia",diff:"easy",q:"O Brasil é o maior produtor mundial de café.",ans:true,exp:"Sim. 35–40% de todo o café do mundo, liderando a produção global há mais de 150 anos."},
  {id:18,type:"tf",cat:"Política",diff:"easy",q:"A Constituição de 1988 é chamada de 'Constituição Cidadã'.",ans:true,exp:"Sim. O deputado Ulysses Guimarães a chamou assim por ser a mais democrática da história brasileira."},
  {id:19,type:"tf",cat:"História",diff:"medium",q:"O Brasil enviou tropas à Europa na Segunda Guerra Mundial.",ans:true,exp:"Correto. A FEB lutou na Itália em 1944–45. Único país latino-americano a enviar tropas terrestres à Europa."},
  {id:20,type:"tf",cat:"Cultura",diff:"medium",q:"A capoeira foi criminalizada no Brasil em parte do século XIX e início do XX.",ans:true,exp:"Sim. O Código Penal de 1890 criminalizava a capoeira. Só foi legalizada na Era Vargas, anos 1930."},
  {id:21,type:"tf",cat:"Natureza",diff:"medium",q:"O Brasil tem a maior diversidade de espécies de aves do mundo.",ans:true,exp:"Correto. Mais de 1.900 espécies de aves registradas — mais que qualquer outro país."},
  {id:22,type:"tf",cat:"Economia",diff:"medium",q:"O Brasil é o maior exportador mundial de açúcar.",ans:true,exp:"Correto. Responde por ~40% das exportações mundiais de açúcar."},
  {id:23,type:"tf",cat:"Natureza",diff:"easy",q:"O Brasil tem a maior diversidade de peixes de água doce do mundo.",ans:true,exp:"Correto. Mais de 3.000 espécies de peixes de água doce — ~15% de todas as espécies do planeta."},
  {id:24,type:"tf",cat:"Cultura",diff:"easy",q:"O futebol foi inventado no Brasil.",ans:false,exp:"Errado. O futebol foi inventado na Inglaterra. Charles Miller trouxe ao Brasil em 1894."},
  {id:25,type:"tf",cat:"Natureza",diff:"hard",q:"O jacaré-do-pantanal existe somente no Brasil.",ans:false,exp:"Errado. Ocorre também na Bolívia e no nordeste da Argentina."},
  {id:26,type:"tf",cat:"Indígenas",diff:"medium",q:"Existem mais de 300 povos indígenas no Brasil atualmente.",ans:true,exp:"Sim. Mais de 305 etnias reconhecidas, ~1,7 milhão de pessoas, mais de 170 línguas distintas."},
  {id:27,type:"tf",cat:"Natureza",diff:"medium",q:"O Brasil possui costas para dois oceanos.",ans:false,exp:"Errado. O Brasil tem apenas costa atlântica — 7.491 km. Não tem saída para o Pacífico."},
  {id:28,type:"tf",cat:"Indígenas",diff:"medium",q:"A Terra Indígena Yanomami é a maior do Brasil.",ans:true,exp:"Sim. 9,6 milhões de hectares na fronteira AM/RR, abrigando ~30.000 Yanomami e Ye'kwana."},
  {id:29,type:"tf",cat:"Indígenas",diff:"hard",q:"A língua portuguesa sempre foi a única língua oficial no Brasil.",ans:false,exp:"Errado. Até o século XVIII, a língua geral (tupi) era mais falada que o português. Só virou obrigatório pelo Marquês de Pombal em 1757."},
  {id:30,type:"tf",cat:"Economia",diff:"medium",q:"O Brasil é o maior exportador mundial de suco de laranja.",ans:true,exp:"Correto. Produz e exporta mais de 80% do suco de laranja do mundo, concentrado no interior de São Paulo."},
  {id:31,type:"mc",cat:"Origem",diff:"easy",q:"Qual foi a primeira capital estabelecida pelos portugueses no Brasil?",opts:["Salvador","Porto Seguro","São Paulo","Rio de Janeiro"],ans:0,exp:"Salvador (Bahia), fundada em 1549 por Tomé de Sousa. Porto Seguro foi o local do 'achamento', mas nunca foi capital."},
  {id:32,type:"mc",cat:"Política",diff:"easy",q:"Quem foi o primeiro presidente do Brasil?",opts:["Prudente de Morais","Floriano Peixoto","Deodoro da Fonseca","Dom Pedro II"],ans:2,exp:"Marechal Deodoro da Fonseca proclamou a República em 15 de novembro de 1889 e tornou-se o primeiro presidente."},
  {id:33,type:"mc",cat:"Natureza",diff:"medium",q:"Qual é a árvore símbolo nacional do Brasil?",opts:["Ipê-amarelo","Pau-brasil","Castanheira-do-Pará","Jatobá"],ans:0,exp:"O ipê-amarelo (Handroanthus albus). A castanheira é símbolo do Pará; o pau-brasil deu nome ao país."},
  {id:34,type:"mc",cat:"Natureza",diff:"medium",q:"Qual é a árvore símbolo da Amazônia?",opts:["Seringueira","Castanheira-do-Pará","Açaizeiro","Mogno"],ans:1,exp:"A castanheira-do-Pará (Bertholletia excelsa). Pode viver 500+ anos e atingir 50 metros de altura."},
  {id:35,type:"mc",cat:"História",diff:"hard",q:"O que eram as sesmarias no Brasil colonial?",opts:["Tributos pagos ao rei","Lotes de terra cedidos pela Coroa para cultivo","Grupos de escravizados para lavoura","Missões jesuíticas"],ans:1,exp:"Sesmarias: lotes de terra concedidos pela Coroa com obrigação de cultivá-los. Base da concentração fundiária que persiste até hoje."},
  {id:36,type:"mc",cat:"Fronteiras",diff:"hard",q:"O que é o Marco do Jauru?",opts:["Uma cachoeira em MT","Um marco que delimita a fronteira Brasil–Bolívia","Uma fortaleza colonial no Pantanal","O ponto mais alto do Pantanal"],ans:1,exp:"O Marco do Jauru demarca a fronteira entre Brasil e Bolívia, estabelecida pelo Tratado de Petrópolis (1903)."},
  {id:37,type:"mc",cat:"História",diff:"easy",q:"A Guerra dos Farrapos teve como epicentro qual estado?",opts:["Santa Catarina","Rio Grande do Sul","São Paulo","Paraná"],ans:1,exp:"A Revolução Farroupilha (1835–1845) teve epicentro no RS, onde proclamaram a República Rio-Grandense."},
  {id:38,type:"mc",cat:"Indígenas",diff:"hard",q:"Qual povo indígena do Pantanal era chamado de 'homens canoa' e ainda existe hoje?",opts:["Guarani","Bororo","Guató","Xavante"],ans:2,exp:"Os Guató viviam nas águas do Pantanal. Um dos grupos mais antigos da região, com ~500 pessoas atualmente."},
  {id:39,type:"mc",cat:"Política",diff:"easy",q:"Em que ano o Brasil se tornou república?",opts:["1822","1888","1889","1891"],ans:2,exp:"República proclamada em 15 de novembro de 1889 por Deodoro da Fonseca. O Império caiu sem uma batalha."},
  {id:40,type:"mc",cat:"Cultura",diff:"medium",q:"Qual instrumento comanda o jogo da capoeira?",opts:["Atabaque","Berimbau","Pandeiro","Agogô"],ans:1,exp:"O berimbau comanda a capoeira. Seus toques ditam o ritmo e a intensidade do jogo."},
  {id:41,type:"mc",cat:"Território",diff:"medium",q:"Com quantos países o Brasil faz fronteira?",opts:["8","9","10","11"],ans:2,exp:"10 países: Argentina, Bolívia, Colômbia, Guiana, Guiana Francesa, Paraguai, Peru, Suriname, Uruguai e Venezuela."},
  {id:42,type:"mc",cat:"Natureza",diff:"easy",q:"Qual bioma ocupa maior área no Brasil?",opts:["Cerrado","Amazônia","Caatinga","Mata Atlântica"],ans:1,exp:"A Amazônia ocupa ~49% do território — ~4,2 milhões de km². Maior bioma tropical do planeta."},
  {id:43,type:"mc",cat:"Economia",diff:"medium",q:"Qual produto foi responsável pelo primeiro ciclo econômico do Brasil colonial?",opts:["Ouro","Café","Cana-de-açúcar","Pau-brasil"],ans:3,exp:"O pau-brasil foi o primeiro produto explorado para exportação do pigmento vermelho. A cana veio depois."},
  {id:44,type:"mc",cat:"História",diff:"medium",q:"Quem foi Zumbi dos Palmares?",opts:["Último líder do Quilombo dos Palmares, símbolo da resistência negra","Primeiro escravo liberto no Brasil","General da Guerra dos Farrapos","Índio aliado dos portugueses"],ans:0,exp:"Zumbi (1655–1695) liderou o maior quilombo das Américas. Morreu em 20 de novembro — Dia da Consciência Negra."},
  {id:45,type:"mc",cat:"Fauna",diff:"easy",q:"Qual é o maior roedor do mundo, comum no Pantanal?",opts:["Queixada","Capivara","Paca","Cutia"],ans:1,exp:"A capivara (Hydrochoerus hydrochaeris), até 65 kg, é o maior roedor do planeta."},
  {id:46,type:"mc",cat:"Território",diff:"medium",q:"Qual é o ponto mais alto do Brasil?",opts:["Pico da Neblina","Pico 31 de Março","Pedra da Mina","Monte Roraima"],ans:0,exp:"Pico da Neblina, Amazonas, 2.994 metros. Identificado como o mais alto apenas em 1962."},
  {id:47,type:"mc",cat:"Política",diff:"easy",q:"Quem assinou a Lei Áurea?",opts:["Dom Pedro II","Princesa Isabel","Deodoro da Fonseca","Visconde do Rio Branco"],ans:1,exp:"A Princesa Isabel assinou a Lei Áurea em 13 de maio de 1888, durante a regência na ausência de Dom Pedro II."},
  {id:48,type:"mc",cat:"Cultura",diff:"medium",q:"Quem escreveu 'Grande Sertão: Veredas'?",opts:["Machado de Assis","Guimarães Rosa","Jorge Amado","Clarice Lispector"],ans:1,exp:"João Guimarães Rosa escreveu 'Grande Sertão: Veredas' (1956), o maior romance brasileiro do século XX."},
  {id:49,type:"mc",cat:"Arquitetura",diff:"medium",q:"Quem projetou Brasília?",opts:["Niemeyer e Lúcio Costa","Rino Levi e Paulo Mendes","Afonso Reidy e Jorge Moreira","Le Corbusier e Niemeyer"],ans:0,exp:"Oscar Niemeyer (edifícios) e Lúcio Costa (Plano Piloto). Brasília é Patrimônio da Humanidade."},
  {id:50,type:"mc",cat:"Água",diff:"hard",q:"Qual porcentagem da água doce superficial do planeta o Brasil possui?",opts:["8%","12%","20%","33%"],ans:1,exp:"~12% de toda a água doce superficial do mundo, principalmente pela bacia amazônica."},
  {id:51,type:"mc",cat:"Ciência",diff:"hard",q:"O que Carlos Chagas descobriu em 1909?",opts:["O vírus da dengue","A tripanossomíase americana (doença de Chagas)","A vacina contra febre amarela","O bacilo da tuberculose"],ans:1,exp:"Chagas descobriu o agente causador, o vetor (barbeiro) e a doença — uma das raras tríplices descobertas da ciência."},
  {id:52,type:"mc",cat:"Religião",diff:"medium",q:"Qual é a maior festa religiosa do Brasil?",opts:["Círio de Nazaré (Belém-PA)","Carnaval do Rio","Festa Junina de Campina Grande","Romaria de Aparecida"],ans:0,exp:"O Círio de Nazaré, em Belém (outubro) — mais de 2 milhões de fiéis na procissão."},
  {id:53,type:"mc",cat:"Natureza",diff:"hard",q:"O que são os 'rios voadores' da Amazônia?",opts:["Rios subterrâneos","Correntes de vapor d'água da floresta que causam chuvas no Centro-Oeste","Cachoeiras que parecem flutuar","O Rio Negro na cheia"],ans:1,exp:"Rios voadores: enormes fluxos de vapor evapotranspirado. Carregam mais água que o próprio Amazonas e causam chuvas distantes."},
  {id:54,type:"mc",cat:"Fronteiras",diff:"medium",q:"Qual país sul-americano NÃO faz fronteira com o Brasil?",opts:["Equador","Uruguai","Bolívia","Suriname"],ans:0,exp:"Equador e Chile são os dois países da América do Sul sem fronteira com o Brasil."},
  {id:55,type:"mc",cat:"História",diff:"hard",q:"O que foi o Tratado de Tordesilhas (1494)?",opts:["Transferiu o Brasil para os espanhóis","Dividiu o mundo entre Portugal e Espanha por linha a 370 léguas de Cabo Verde","Paz entre Portugal e Holanda","Definiu os limites da Amazônia"],ans:1,exp:"Tordesilhas dividiu o 'Novo Mundo'. A linha acabou incluindo o Brasil no lado português."},
  {id:56,type:"mc",cat:"Indígenas",diff:"medium",q:"Qual língua indígena deu mais palavras ao português do Brasil?",opts:["Guarani","Tupi","Nheengatu","Carib"],ans:1,exp:"O Tupi deu centenas de palavras: piranha, tucano, jacaré, capim, pipoca, abacaxi, mandioca e muitas outras."},
  {id:57,type:"mc",cat:"História",diff:"medium",q:"O que foi a Inconfidência Mineira (1789)?",opts:["Revolta de escravizados","Tentativa de independência liderada por intelectuais mineiros","Guerra entre Portugal e Holanda","Abolição do trabalho escravo em Minas"],ans:1,exp:"Movimento separatista de intelectuais e militares mineiros. Tiradentes foi o único executado."},
  {id:58,type:"mc",cat:"Fauna",diff:"easy",q:"Qual é o pássaro nacional do Brasil?",opts:["Arara-azul","Tucano","Sabiá-laranjeira","Bem-te-vi"],ans:2,exp:"O sabiá-laranjeira (Turdus rufiventris) é o pássaro nacional desde 2002."},
  {id:59,type:"mc",cat:"Território",diff:"easy",q:"Qual é o estado brasileiro com maior área?",opts:["Pará","Amazonas","Mato Grosso","Minas Gerais"],ans:1,exp:"O Amazonas tem 1,57 milhão de km² — maior que a Mongólia."},
  {id:60,type:"mc",cat:"Política",diff:"medium",q:"Qual foi a primeira constituição republicana do Brasil?",opts:["Constituição de 1824","Constituição de 1891","Constituição de 1934","Constituição de 1988"],ans:1,exp:"Constituição de 1891: a primeira da República, inspirada no federalismo americano."},
  {id:61,type:"mc",cat:"Esporte",diff:"easy",q:"Quantas vezes o Brasil ganhou a Copa do Mundo?",opts:["3","4","5","6"],ans:2,exp:"Pentacampeão: 1958, 1962, 1970, 1994 e 2002. Nenhum outro país ganhou 5 vezes."},
  {id:62,type:"mc",cat:"Economia",diff:"medium",q:"O que foi a 'política do café-com-leite'?",opts:["Acordo entre Brasil e Argentina","Revezamento de presidentes entre SP e MG na Primeira República","Exportação conjunta de café e laticínios","Mistura de culturas no Sul"],ans:1,exp:"SP (café) e MG (leite) se revezavam na presidência. Getúlio Vargas rompeu isso em 1930."},
  {id:63,type:"mc",cat:"Água",diff:"easy",q:"Qual rio forma as maiores cataratas do mundo na fronteira Brasil-Argentina?",opts:["Rio Paraná","Rio Iguaçu","Rio Paraguai","Rio Uruguai"],ans:1,exp:"Cataratas do Iguaçu: 275 quedas, até 80 metros. As maiores do mundo em volume e impacto visual."},
  {id:64,type:"mc",cat:"História",diff:"medium",q:"O que mais contribuiu para o fim do Império brasileiro?",opts:["Derrota na Guerra do Paraguai","Abolição da Escravatura, que retirou apoio ao imperador","A morte de Dom Pedro II","Uma invasão estrangeira"],ans:1,exp:"A Lei Áurea (1888) alienou a elite escravocrata. Sem apoio, Dom Pedro II foi deposto em 1889 sem resistência."},
  {id:65,type:"mc",cat:"Fauna",diff:"hard",q:"Qual animal causa o maior número de mortes humanas no Brasil por ano?",opts:["Onça-pintada","Cascavel","Escorpião-amarelo","Abelha africanizada"],ans:2,exp:"O escorpião-amarelo (Tityus serrulatus) causa o maior número de mortes por peçonhento no Brasil, especialmente crianças."},
  {id:66,type:"mc",cat:"Arte",diff:"medium",q:"Qual artista criou o 'Abaporu', que originou o Manifesto Antropofágico?",opts:["Tarsila do Amaral","Anita Malfatti","Di Cavalcanti","Lasar Segall"],ans:0,exp:"Tarsila do Amaral pintou o 'Abaporu' em 1928, inspirando Oswald de Andrade a criar o Manifesto Antropofágico."},
  {id:67,type:"mc",cat:"Cultura",diff:"medium",q:"O que é o Bumba-meu-boi?",opts:["Dança folclórica do Sul","Auto folclórico nordestino sobre morte e ressurreição de um boi","Festa indígena da Amazônia","Ritual do candomblé"],ans:1,exp:"O Bumba-meu-boi, especialmente no Maranhão, mistura elementos indígenas, africanos e europeus."},
  {id:68,type:"mc",cat:"Capitais",diff:"easy",q:"Em que ordem foram as capitais do Brasil?",opts:["Salvador → Rio de Janeiro → Brasília","Rio de Janeiro → Salvador → Brasília","Salvador → Brasília → Rio de Janeiro","Rio de Janeiro → Brasília → Salvador"],ans:0,exp:"Salvador (1549–1763) → Rio de Janeiro (1763–1960) → Brasília (1960–hoje)."},
  {id:69,type:"mc",cat:"História",diff:"hard",q:"O que causou a Revolta da Chibata (1910)?",opts:["Castigos físicos legais aplicados a marinheiros negros na Marinha","Falta de pagamento a soldados","Má qualidade da comida nos navios","Presença de oficiais estrangeiros"],ans:0,exp:"João Cândido, o 'Almirante Negro', liderou a revolta contra as chicotadas — resquício legal da escravidão na Marinha, 22 anos após a abolição."},
  {id:70,type:"mc",cat:"Economia",diff:"easy",q:"Qual é o maior porto da América Latina?",opts:["Porto de Santos (SP)","Porto de Paranaguá (PR)","Porto de Itajaí (SC)","Porto do Rio de Janeiro"],ans:0,exp:"O Porto de Santos movimenta mais de 130 milhões de toneladas por ano — o maior da América Latina."},
  {id:71,type:"mc",cat:"Água",diff:"medium",q:"Qual é a maior usina hidrelétrica do Brasil em capacidade instalada?",opts:["Itaipu (PR)","Belo Monte (PA)","Tucuruí (PA)","Santo Antônio (RO)"],ans:1,exp:"Belo Monte, no Pará, é a maior do Brasil e a segunda do mundo em capacidade instalada (11.233 MW)."},
  {id:72,type:"mc",cat:"Saúde",diff:"hard",q:"Qual serpente causa o maior número de acidentes ofídicos no Brasil?",opts:["Surucucu","Cascavel","Jararaca","Cobra-coral"],ans:2,exp:"A jararaca (Bothrops jararaca) é responsável por mais de 70% dos acidentes ofídicos no Brasil."},
  {id:73,type:"mc",cat:"Ciência",diff:"medium",q:"O que é o INPA?",opts:["Instituto Nacional de Pesquisas da Amazônia","Instituto Nacional de Proteção Ambiental","Instituto Nacional de Pesquisa Agrícola","Instituto de Navegação Pantaneira"],ans:0,exp:"INPA, fundado em 1952, é o principal centro científico sobre a Amazônia, sediado em Manaus."},
  {id:74,type:"mc",cat:"Identidade",diff:"easy",q:"Por que o Brasil é chamado de 'País da Diversidade'?",opts:["Porque tem 5 biomas","Porque mistura indígenas, africanos, europeus, asiáticos e árabes em cultura única","Porque tem o maior número de idiomas","Porque tem a maior diversidade de aves"],ans:1,exp:"305+ etnias indígenas, africanos, portugueses, italianos, alemães, japoneses, sírio-libaneses — cultura única e plural."},
  {id:75,type:"mc",cat:"Natureza",diff:"hard",q:"Qual bioma perdeu mais de 85% de sua área e abriga 70% das espécies ameaçadas do Brasil?",opts:["Cerrado","Caatinga","Mata Atlântica","Pampa"],ans:2,exp:"A Mata Atlântica: menos de 12% da área original. Paradoxo trágico — menos floresta, mais espécies ameaçadas."},
  {id:76,type:"mc",cat:"Música",diff:"medium",q:"Qual ritmo do Recôncavo Baiano é Patrimônio da Humanidade (UNESCO)?",opts:["Forró","Samba","Samba de Roda","Axé"],ans:2,exp:"O Samba de Roda do Recôncavo Baiano foi inscrito na UNESCO em 2005. Ancestral do samba urbano carioca."},
  {id:77,type:"mc",cat:"Indígenas",diff:"hard",q:"Qual povo indígena do Sul tem cosmologia dual Kamé e Kairu?",opts:["Guarani","Kaingang","Xokleng","Bororo"],ans:1,exp:"Os Kaingang habitam o Sul do Brasil. Sua cosmologia dual (Kamé e Kairu) organiza toda a vida social e ritual."},
  {id:78,type:"mc",cat:"Ciência",diff:"hard",q:"Qual neurocientista brasileira descobriu que o cérebro humano tem 86 bilhões de neurônios?",opts:["Mayana Zatz","Lygia da Veiga Pereira","Suzana Herculano-Houzel","Helena Nader"],ans:2,exp:"Suzana Herculano-Houzel derrubou o mito dos 100 bilhões de neurônios. O real é 86 bilhões."},
  {id:79,type:"mc",cat:"Arte",diff:"medium",q:"Quem escreveu 'Os Sertões', relato da Guerra de Canudos?",opts:["Machado de Assis","Euclides da Cunha","José de Alencar","Graciliano Ramos"],ans:1,exp:"Euclides da Cunha (1866–1909) escreveu 'Os Sertões' (1902), clássico sobre a guerra de Canudos (1896–1897)."},
  {id:80,type:"mc",cat:"História",diff:"hard",q:"O que foi a Cabanagem (1835–1840)?",opts:["Revolta popular na Amazônia que matou até 40% da população do Grão-Pará","Revolta de escravizados em Salvador","Expulsão dos jesuítas do Pará","Migração forçada de indígenas"],ans:0,exp:"A Cabanagem: caboclos, indígenas e mestiços tomaram Belém. Estima-se 30.000–40.000 mortos em 5 anos de repressão brutal."},
  {id:81,type:"mc",cat:"Saúde",diff:"medium",q:"Qual médico erradicou a febre amarela do Rio de Janeiro no início do século XX?",opts:["Adolfo Lutz","Oswaldo Cruz","Carlos Chagas","Vital Brazil"],ans:1,exp:"Oswaldo Cruz usou brigadas de saúde e vacinação forçada — gerando a Revolta da Vacina de 1904."},
  {id:82,type:"mc",cat:"Natureza",diff:"medium",q:"O que é o Pantanal?",opts:["A maior floresta tropical do Brasil","A maior planície alagável do mundo","O maior deserto da América do Sul","O maior lago de água doce do mundo"],ans:1,exp:"O Pantanal é a maior planície alagável do planeta — ~150.000 km². Patrimônio Natural da Humanidade (UNESCO)."},
  {id:83,type:"mc",cat:"Território",diff:"easy",q:"Qual é o menor estado do Brasil em área?",opts:["Alagoas","Sergipe","Rio de Janeiro","Espírito Santo"],ans:1,exp:"Sergipe, com 21.910 km², é o menor estado do Brasil."},
  {id:84,type:"mc",cat:"Natureza",diff:"medium",q:"Qual bioma possui a maior diversidade de espécies vegetais (12.000+)?",opts:["Amazônia","Cerrado","Mata Atlântica","Pantanal"],ans:1,exp:"O Cerrado é a savana mais biodiversa do mundo, com mais de 12.000 espécies vegetais, muitas endêmicas."},
  {id:85,type:"mc",cat:"Cultura",diff:"medium",q:"O que é o candomblé?",opts:["Dança folclórica do Nordeste","Religião afro-brasileira com raízes nos povos Yorubá, Fon e Banto","Festa popular de origem indígena","Ritual de cura de origem portuguesa"],ans:1,exp:"O candomblé preserva cultos aos orixás dos africanos escravizados. Centros mais tradicionais em Salvador (BA)."},
  {id:86,type:"mc",cat:"Cultura",diff:"medium",q:"O que é a Literatura de Cordel?",opts:["Poesia épica do Sul em livros caros","Poesia popular nordestina impressa em folhetos simples pendurados em cordas","Gênero musical de origem indígena","Dança tradicional do Ceará"],ans:1,exp:"O cordel é poesia popular em folhetos baratos, vendida em feiras nordestinas. Raízes ibéricas, trata do cotidiano e da história."},
  {id:87,type:"mc",cat:"Política",diff:"medium",q:"Quando Dom Pedro I declarou a Independência do Brasil?",opts:["7 de setembro de 1822, Rio Ipiranga (SP)","15 de novembro de 1889, Rio de Janeiro","22 de abril de 1500, Porto Seguro","1 de março de 1823, Salvador"],ans:0,exp:"7 de setembro de 1822, às margens do Rio Ipiranga, em São Paulo."},
  {id:88,type:"mc",cat:"Natureza",diff:"medium",q:"Qual bioma ocupa o Sul do Brasil com características de estepe?",opts:["Cerrado","Caatinga","Pampa","Mata de Araucárias"],ans:2,exp:"O Pampa (Campos Sulinos) ocupa o RS. É o bioma mais ameaçado do Brasil — mais de 54% já convertido."},
  {id:89,type:"mc",cat:"Ciência",diff:"hard",q:"Onde estão as maiores reservas do pré-sal brasileiro?",opts:["Bacia de Campos (RJ)","Bacia de Santos (SP)","Bacia do Solimões (AM)","Espírito Santo"],ans:1,exp:"A Bacia de Santos concentra as maiores reservas do pré-sal, descobertas em 2006 pela Petrobras, a 5–7 km de profundidade."},
  {id:90,type:"mc",cat:"Economia",diff:"medium",q:"Qual produto financiou a industrialização de São Paulo no século XIX?",opts:["Borracha","Ouro","Café","Algodão"],ans:2,exp:"O ciclo do café (1830–1930) transformou SP. O Brasil chegou a produzir 80% do café mundial."},
  {id:91,type:"mc",cat:"História",diff:"medium",q:"O que foi a Inconfidência Mineira (1789)?",opts:["Revolta de escravizados","Tentativa de independência liderada por intelectuais mineiros","Guerra entre Portugal e Holanda","Abolição do trabalho escravo"],ans:1,exp:"Movimento separatista de intelectuais e militares mineiros. Tiradentes foi o único executado."},
  {id:92,type:"mc",cat:"Fauna",diff:"medium",q:"Qual a maior lagoa do Brasil?",opts:["Lagoa dos Patos (RS)","Lagoa Mirim (RS)","Lago de Itaipu (PR)","Lagoa da Pampulha (MG)"],ans:0,exp:"Lagoa dos Patos, RS, com 10.360 km² — a maior lagoa do Brasil e segunda da América do Sul."},
  {id:93,type:"mc",cat:"História",diff:"hard",q:"Qual foi a batalha mais importante dos pracinhas na Itália (WWII)?",opts:["Monte Cassino","Monte Castello","El Alamein","Anzio"],ans:1,exp:"Batalha de Monte Castello (fevereiro de 1945): o maior feito militar da FEB na Itália."},
  {id:94,type:"mc",cat:"Cultura",diff:"easy",q:"Quem escreveu 'Iracema', o clássico sobre a origem do Ceará?",opts:["José de Alencar","Machado de Assis","Euclides da Cunha","Graciliano Ramos"],ans:0,exp:"José de Alencar (1829–1877) escreveu Iracema (1865). A índia Iracema e o português Martim geram Moacir — símbolo do povo cearense."},
  {id:95,type:"mc",cat:"Ciência",diff:"hard",q:"O que Santos Dumont reivindicava ter inventado?",opts:["O motor a vapor","O avião com decolagem autônoma sem catapulta","O dirigível a hidrogênio","O submarino"],ans:1,exp:"O 14-Bis voou em Paris em 1906 — decolagem autônoma. Para os brasileiros, o pai da aviação."},
  {id:96,type:"mc",cat:"Fauna",diff:"easy",q:"Qual é o pássaro nacional do Brasil?",opts:["Arara-azul","Tucano","Sabiá-laranjeira","Bem-te-vi"],ans:2,exp:"O sabiá-laranjeira (Turdus rufiventris) é o pássaro nacional desde 2002."},
  {id:97,type:"mc",cat:"Economia",diff:"easy",q:"Qual é o maior porto da América Latina?",opts:["Porto de Santos (SP)","Porto de Paranaguá (PR)","Porto de Itajaí (SC)","Porto do Rio de Janeiro"],ans:0,exp:"O Porto de Santos movimenta mais de 130 milhões de toneladas por ano."},
  {id:98,type:"mc",cat:"Natureza",diff:"easy",q:"Qual é o maior roedor do mundo?",opts:["Queixada","Capivara","Paca","Cutia"],ans:1,exp:"A capivara (Hydrochoerus hydrochaeris), até 65 kg. Muito abundante no Pantanal e em todo o Brasil."},
  {id:99,type:"mc",cat:"Política",diff:"hard",q:"O que foi a 'política do café-com-leite'?",opts:["Acordo comercial entre Brasil e Argentina","Revezamento de presidentes entre SP (café) e MG (leite) na Primeira República","Política agrícola do Império","Programa de exportação do século XIX"],ans:1,exp:"SP e MG se revezavam na presidência durante a Primeira República. Getúlio Vargas rompeu esse acordo em 1930."},
  {id:100,type:"mc",cat:"Cultura",diff:"medium",q:"O que é o candomblé?",opts:["Uma dança gaúcha","Religião afro-brasileira com raízes yorubá, fon e banto","Uma festa do folclore amazônico","Um ritual de origem portuguesa"],ans:1,exp:"O candomblé preserva os cultos aos orixás dos africanos escravizados. Salvador (BA) tem os terreiros mais tradicionais do Brasil."},
  {id:101,type:"tf",cat:"História",diff:"medium",q:"A Guerra do Paraguai (1864–1870) foi o conflito mais devastador da história da América do Sul.",ans:true,exp:"Correto. A Guerra da Tríplice Aliança (Brasil, Argentina e Uruguai contra o Paraguai) matou entre 60% e 90% da população masculina paraguaia e devastou economicamente toda a região."},
  {id:102,type:"tf",cat:"Natureza",diff:"medium",q:"O Brasil possui a maior reserva de água doce subterrânea do mundo, o Aquífero Guarani.",ans:false,exp:"Errado na afirmação de 'maior do mundo'. O Aquífero Guarani é um dos maiores do mundo, mas não o maior — esse título é disputado com o Aquífero de Núbia (África) e outros. É, porém, o maior da América do Sul."},
  {id:103,type:"tf",cat:"Cultura",diff:"easy",q:"O axé é um ritmo musical que surgiu em Salvador, Bahia, na década de 1980.",ans:true,exp:"Correto. O axé music surgiu em Salvador nos anos 1980, misturando ritmos afro-brasileiros como o afoxé, o samba-reggae e o frevo, com artistas como Luiz Caldas e Banda Mel como pioneiros."},
  {id:104,type:"tf",cat:"Ciência",diff:"hard",q:"O Brasil foi o primeiro país do mundo a usar o etanol como combustível em larga escala.",ans:true,exp:"Correto. O Programa Nacional do Álcool (Proálcool), criado em 1975 após a crise do petróleo, tornou o Brasil pioneiro mundial no uso de etanol como combustível veicular em escala industrial."},
  {id:105,type:"tf",cat:"Fauna",diff:"medium",q:"O tamanduá-bandeira pode ingerir até 35.000 formigas e cupins por dia.",ans:true,exp:"Correto. O tamanduá-bandeira (Myrmecophaga tridactyla) tem língua que pode se estender 60 cm, movida 150 vezes por minuto, capturando milhares de insetos por refeição — sem dentes para mastigar."},
  {id:106,type:"tf",cat:"Economia",diff:"medium",q:"A Embraer é a terceira maior fabricante de aviões comerciais do mundo.",ans:true,exp:"Correto. A Embraer, fundada em 1969, é a terceira maior fabricante de aviões comerciais do mundo, atrás de Boeing e Airbus. Seus jatos regionais E-Jet são usados em mais de 70 países."},
  {id:107,type:"tf",cat:"História",diff:"hard",q:"O Quilombo dos Palmares chegou a ter 30.000 habitantes e existiu por quase 100 anos.",ans:true,exp:"Correto. O Quilombo dos Palmares (1605–1694), no atual Alagoas, chegou a ter entre 20.000 e 30.000 habitantes. Foi a maior e mais duradoura sociedade de escravizados fugitivos das Américas."},
  {id:108,type:"tf",cat:"Natureza",diff:"easy",q:"O Brasil é o único país do mundo que tem nome de uma planta.",ans:false,exp:"Errado. Vários países têm nomes derivados de plantas ou árvores: Belize (madeira belice), Arboré (atual Zimbabwe), entre outros. O Brasil é um exemplo notável, mas não o único."},
  {id:109,type:"tf",cat:"Política",diff:"medium",q:"O Brasil foi o primeiro país da América Latina a ter uma mulher como presidente.",ans:false,exp:"Errado. A Nicaraguense Violeta Chamorro foi a primeira mulher eleita presidente na América Latina, em 1990. Dilma Rousseff, eleita em 2010, foi a primeira presidenta do Brasil — mas não a primeira da América Latina."},
  {id:110,type:"tf",cat:"Cultura",diff:"medium",q:"O frevo é uma dança e ritmo musical originário de Pernambuco.",ans:true,exp:"Correto. O frevo nasceu em Recife (PE) no início do século XX, provavelmente da fusão de marchas militares com a capoeira. Em 2012, foi declarado Patrimônio Cultural Imaterial da Humanidade pela UNESCO."},
  {id:111,type:"tf",cat:"Natureza",diff:"hard",q:"A piranha é um peixe exclusivamente brasileiro.",ans:false,exp:"Errado. As piranhas (família Serrasalmidae) são encontradas em rios da América do Sul inteira: Brasil, Venezuela, Colômbia, Peru, Argentina, Bolívia. O Brasil tem a maior diversidade de espécies, mas não exclusividade."},
  {id:112,type:"tf",cat:"Arquitetura",diff:"medium",q:"O Cristo Redentor, no Rio de Janeiro, foi inaugurado em 1931.",ans:true,exp:"Correto. O Cristo Redentor foi inaugurado em 12 de outubro de 1931, após 9 anos de construção. É uma das Sete Maravilhas do Mundo Moderno desde 2007."},
  {id:113,type:"tf",cat:"Economia",diff:"easy",q:"A Petrobras é uma empresa 100% estatal, sem ações na bolsa.",ans:false,exp:"Errado. A Petrobras é uma sociedade de economia mista — tem ações negociadas em bolsa (PETR3 e PETR4 na B3, e ADRs em Nova York), mas o governo federal é o acionista majoritário."},
  {id:114,type:"tf",cat:"Indígenas",diff:"hard",q:"O Brasil tem povos indígenas em isolamento voluntário — que nunca tiveram contato oficial com a sociedade nacional.",ans:true,exp:"Correto. O Brasil tem o maior número de povos isolados do mundo — a FUNAI reconhece mais de 100 referências de grupos em isolamento, principalmente na Amazônia. A política oficial é de não-contato."},
  {id:115,type:"tf",cat:"Cultura",diff:"medium",q:"O choro é considerado o primeiro gênero musical genuinamente brasileiro.",ans:true,exp:"Correto. O choro surgiu no Rio de Janeiro na segunda metade do século XIX, misturando polka europeia com influências africanas. É considerado o primeiro gênero musical urbano genuinamente brasileiro, anterior ao samba."},
  {id:116,type:"mc",cat:"História",diff:"medium",q:"Qual foi o período da ditadura militar no Brasil?",opts:["1930–1945","1964–1985","1937–1945","1955–1964"],ans:1,exp:"A ditadura militar brasileira durou de 1964 (golpe contra João Goulart) a 1985 (eleição indireta de Tancredo Neves). Foram 21 anos com 5 generais presidentes e grave supressão de direitos civis."},
  {id:117,type:"mc",cat:"Natureza",diff:"medium",q:"Qual é a maior bacia hidrográfica do mundo?",opts:["Bacia do Rio Nilo","Bacia do Rio Amazonas","Bacia do Rio Mississippi","Bacia do Rio Congo"],ans:1,exp:"A Bacia Amazônica, com cerca de 7 milhões de km², é a maior bacia hidrográfica do mundo em área e em volume de água. O Brasil detém a maior parte dessa bacia."},
  {id:118,type:"mc",cat:"Economia",diff:"hard",q:"Qual é a principal commodity de exportação do Brasil atualmente?",opts:["Café","Minério de ferro","Soja","Carne bovina"],ans:2,exp:"A soja é atualmente a principal commodity exportada pelo Brasil, respondendo por mais de 15% de toda a pauta exportadora. O Brasil é o maior produtor e exportador mundial de soja."},
  {id:119,type:"mc",cat:"História",diff:"hard",q:"Quem foi Getúlio Vargas e por quanto tempo governou o Brasil?",opts:["Presidente por 4 anos, deposto em 1945","Ditador que governou por 15 anos no total, entre 1930 e 1954","Primeiro presidente civil após a ditadura militar","Governador que proclamou a República"],ans:1,exp:"Getúlio Vargas governou o Brasil por 15 anos no total: como ditador do Estado Novo (1937–1945) e como presidente eleito (1950–1954), quando se suicidou deixando uma carta-testamento histórica."},
  {id:120,type:"mc",cat:"Cultura",diff:"medium",q:"O que é o maracatu?",opts:["Uma dança gaúcha derivada da polca","Cortejo afro-pernambucano com raízes nos cultos reais africanos","Uma variação do forró tocada no interior do Ceará","Um instrumento de percussão do candomblé"],ans:1,exp:"O maracatu é um cortejo afro-brasileiro originário de Pernambuco, com raízes nos cultos reais africanos (coroação de reis negros). O Maracatu Nação é reconhecido como Patrimônio Cultural Imaterial."},
  {id:121,type:"mc",cat:"Ciência",diff:"hard",q:"O que é o EMBRAPA?",opts:["Empresa Brasileira de Pesquisa Agropecuária, responsável pela revolução agrícola do Cerrado","Empresa de tecnologia aeroespacial brasileira","Instituto de pesquisas marinhas da Amazônia","Agência reguladora do petróleo brasileiro"],ans:0,exp:"A EMBRAPA (fundada em 1973) desenvolveu tecnologias que transformaram o Cerrado em celeiro do mundo. Adaptou a soja ao clima tropical e desenvolveu cultivares resistentes — uma das maiores revoluções agrícolas da história."},
  {id:122,type:"mc",cat:"Natureza",diff:"medium",q:"O que é a floresta de igapó?",opts:["Floresta amazônica que nunca alaga","Floresta amazônica que permanece inundada durante todo ou grande parte do ano","Floresta de mangue do litoral norte","Mata ciliar do Pantanal"],ans:1,exp:"Igapó é a floresta amazônica periodicamente ou permanentemente inundada por águas escuras (ácidas e pobres em nutrientes), como as do Rio Negro. Diferente da várzea, que alaga com águas brancas ricas em sedimentos."},
  {id:123,type:"mc",cat:"História",diff:"medium",q:"O que foi o Contestado (1912–1916)?",opts:["Disputa territorial entre Brasil e Argentina","Guerra entre grupos messiânicos do Sul e as forças do governo federal","Conflito de terras entre fazendeiros e indígenas no Mato Grosso","Revolta de escravizados no Paraná"],ans:1,exp:"A Guerra do Contestado foi um conflito no sul do Brasil (PR/SC) entre sertanejos liderados por figuras messiânicas e as forças do governo. Causado pela expansão ferroviária e expulsão de posseiros — um dos maiores conflitos rurais do Brasil."},
  {id:124,type:"mc",cat:"Fauna",diff:"hard",q:"Qual é o maior peixe de água doce do Brasil?",opts:["Piranha","Pirarucu","Tucunaré","Dourado"],ans:1,exp:"O pirarucu (Arapaima gigas) pode atingir 3 metros e 250 kg, sendo o maior peixe escamoso de água doce do mundo. É nativo da Amazônia e um dos maiores peixes de água doce do planeta."},
  {id:125,type:"mc",cat:"Arquitetura",diff:"medium",q:"Qual é o maior estádio de futebol do Brasil em capacidade?",opts:["Maracanã (RJ)","Arena Corinthians (SP)","Mineirão (MG)","Morumbi (SP)"],ans:0,exp:"O Maracanã, no Rio de Janeiro, é o maior estádio do Brasil com capacidade para cerca de 78.000 torcedores. Já teve capacidade para 200.000 pessoas, quando foi palco da Copa do Mundo de 1950."},
  {id:126,type:"mc",cat:"Indígenas",diff:"medium",q:"O que é o FUNAI?",opts:["Fundação Nacional dos Povos Indígenas, responsável pela proteção dos direitos indígenas","Fundo Nacional de Assistência Indigente","Frente Nacional de Arqueologia Indígena","Fundação Nacional de Artes Indígenas"],ans:0,exp:"A FUNAI (Fundação Nacional dos Povos Indígenas), criada em 1967, é o órgão federal responsável por estabelecer e executar a política indigenista do Brasil, incluindo a demarcação de terras e proteção de direitos."},
  {id:127,type:"mc",cat:"Cultura",diff:"hard",q:"Quem foi Machado de Assis e por que é considerado o maior escritor brasileiro?",opts:["Poeta romântico do século XVIII, autor de 'I-Juca Pirama'","Fundador do realismo literário brasileiro, autor de 'Dom Casmurro' e 'Memórias Póstumas de Brás Cubas'","Escritor modernista autor de 'Macunaíma'","Cronista colonial autor do 'Caramuru'"],ans:1,exp:"Machado de Assis (1839–1908), filho de um pintor negro e uma lavadeira portuguesa, tornou-se o maior nome da literatura brasileira. Fundou a ABL e criou um realismo inovador com narrador não confiável — décadas antes do modernismo europeu."},
  {id:128,type:"mc",cat:"Natureza",diff:"easy",q:"Quantos estados têm o Brasil?",opts:["24","25","26","27"],ans:2,exp:"O Brasil tem 26 estados mais o Distrito Federal, totalizando 27 unidades federativas. Os estados são divididos em 5 regiões: Norte, Nordeste, Centro-Oeste, Sudeste e Sul."},
  {id:129,type:"mc",cat:"Economia",diff:"medium",q:"O que é a B3?",opts:["A segunda maior construtora do Brasil","A bolsa de valores do Brasil, resultado da fusão de bolsas brasileiras","O banco central do Brasil","Uma empresa de tecnologia de São Paulo"],ans:1,exp:"A B3 (Brasil, Bolsa, Balcão) é a bolsa de valores do Brasil, resultado da fusão entre a BM&FBovespa e a Cetip em 2017. É a maior bolsa da América Latina e a 5ª maior do mundo em valor de mercado."},
  {id:130,type:"mc",cat:"História",diff:"medium",q:"O que foi o Tenentismo dos anos 1920 no Brasil?",opts:["Movimento artístico de jovens pintores","Movimento político-militar de jovens oficiais que questionavam a Primeira República","Rebelião de escravizados liderada por militares","Reforma educacional proposta por tenentes republicanos"],ans:1,exp:"O Tenentismo foi um movimento político-militar de jovens oficiais (tenentes) que questionavam a corrupção da República Velha. Resultou em revoltas como o episódio dos 18 do Forte de Copacabana (1922) e a Coluna Prestes (1925–1927)."},
  {id:131,type:"mc",cat:"Fauna",diff:"medium",q:"Qual é a cobra mais longa do Brasil?",opts:["Sucuri","Jiboia","Anaconda amarela","Surucucu"],ans:0,exp:"A sucuri (Eunectes murinus), também chamada de anaconda verde, é a cobra mais longa do Brasil e a mais pesada do mundo, podendo atingir 8–9 metros e 250 kg. Vive na Amazônia e no Pantanal."},
  {id:132,type:"mc",cat:"Cultura",diff:"medium",q:"O que é a Festa Junina e qual sua origem?",opts:["Festa indígena de colheita do milho","Festa de origem europeia (portuguesa) em homenagem a santos católicos, adaptada no Brasil","Celebração afro-brasileira do solstício de inverno","Festival de folclore criado pelo governo Vargas"],ans:1,exp:"As Festas Juninas têm origem europeia — as festas de Santo Antônio, São João e São Pedro, trazidas pelos portugueses. No Brasil, foram adaptadas com elementos do sertão nordestino: quadrilha, forró, comidas típicas e fogos de artifício."},
  {id:133,type:"mc",cat:"Ciência",diff:"hard",q:"O que é o programa espacial ALCÂNTARA e por que é estratégico?",opts:["Base de lançamento no Maranhão próxima ao Equador, que reduz o custo de lançamentos de satélites","Programa de satélites meteorológicos do INPE","Centro de pesquisa aeroespacial em São Paulo","Projeto de foguete movido a etanol desenvolvido pelo ITA"],ans:0,exp:"A Base de Alcântara (MA) é um dos pontos mais estratégicos do mundo para lançamentos espaciais por estar a apenas 2,3° da linha do Equador — onde a rotação terrestre é máxima, economizando até 30% de combustível nos lançamentos."},
  {id:134,type:"mc",cat:"Natureza",diff:"hard",q:"O que é a RESEX — Reserva Extrativista — e quem protagonizou sua criação?",opts:["Uma reserva de mineração controlada pelo governo federal","Uma categoria de área protegida que permite o uso sustentável por populações tradicionais, criada após a luta de Chico Mendes","Um parque nacional sem presença humana, criado por Dilma Rousseff","Uma reserva indígena na Amazônia para povos em isolamento"],ans:1,exp:"As Reservas Extrativistas foram criadas após a luta e o assassinato de Chico Mendes (1988). Permitem que seringueiros e populações tradicionais vivam e trabalhem sustentavelmente na floresta. A RESEX Chico Mendes, no Acre, foi a primeira."},
  {id:135,type:"mc",cat:"História",diff:"hard",q:"O que foi a Revolta de Canudos (1896–1897)?",opts:["Uma revolta de escravizados no interior da Bahia","Uma guerra entre o governo federal e uma comunidade mística liderada por Antônio Conselheiro no sertão baiano","Uma rebelião de indígenas no Vale do São Francisco","Um conflito entre fazendeiros e trabalhadores no Nordeste"],ans:1,exp:"A Guerra de Canudos foi travada no sertão baiano entre o governo republicano e milhares de sertanejos seguidores de Antônio Conselheiro. Quatro expedições militares foram necessárias. Canudos foi destruída — estima-se 15.000 a 25.000 mortos."},
  {id:136,type:"mc",cat:"Fauna",diff:"easy",q:"Qual é o maior animal terrestre nativo do Brasil?",opts:["Onça-pintada","Anta","Capivara","Veado-campeiro"],ans:1,exp:"A anta (Tapirus terrestris) é o maior mamífero terrestre nativo da América do Sul, podendo pesar até 300 kg. É um excelente dispersor de sementes e fundamental para a regeneração das florestas tropicais."},
  {id:137,type:"mc",cat:"Cultura",diff:"hard",q:"Quem foi Glauber Rocha e qual movimento ele liderou?",opts:["Escritor do realismo mágico brasileiro, autor de 'Galáxias'","Cineasta baiano, principal nome do Cinema Novo nos anos 1960–70","Músico fundador do Tropicalismo com Caetano Veloso","Arquiteto modernista que projetou o Pelourinho"],ans:1,exp:"Glauber Rocha (1939–1981) foi o principal nome do Cinema Novo brasileiro, movimento que propunha 'uma câmera na mão e uma ideia na cabeça'. Filmes como 'Deus e o Diabo na Terra do Sol' e 'Terra em Transe' são marcos do cinema mundial."},
  {id:138,type:"mc",cat:"Natureza",diff:"medium",q:"O que é o INPE?",opts:["Instituto Nacional de Pesquisas Espaciais, responsável pelo monitoramento do desmatamento","Instituto Nacional de Proteção Ecológica","Instituto Nacional de Pesquisa em Energia","Instituto de Navegação, Petróleo e Exploração"],ans:0,exp:"O INPE (Instituto Nacional de Pesquisas Espaciais) monitora o desmatamento da Amazônia com seus sistemas PRODES e DETER, além de operar satélites e conduzir pesquisas climáticas e espaciais."},
  {id:139,type:"mc",cat:"Economia",diff:"medium",q:"O que é a Zona Franca de Manaus e por que foi criada?",opts:["Uma reserva ambiental com incentivos para pesquisa científica","Uma área de livre comércio criada para desenvolver a Amazônia Ocidental e integrar a região ao Brasil","Uma área industrial no porto de Manaus para exportação de borracha","Um polo turístico criado pelo governo militar para atrair estrangeiros"],ans:1,exp:"A Zona Franca de Manaus (ZFM), criada em 1967, é uma área de livre comércio com incentivos fiscais, criada para integrar economicamente a Amazônia ao Brasil e inibir a ocupação estrangeira da região. Hoje gera centenas de milhares de empregos."},
  {id:140,type:"mc",cat:"História",diff:"easy",q:"O que foi o Tropicalismo?",opts:["Movimento literário do século XIX que celebrava a natureza brasileira","Movimento cultural dos anos 1960 que misturou rock, MPB e vanguarda, liderado por Caetano Veloso e Gilberto Gil","Estilo arquitetônico tropical desenvolvido por Oscar Niemeyer","Escola de pintura modernista da Semana de Arte Moderna de 1922"],ans:1,exp:"O Tropicalismo foi um movimento cultural de 1967–1968 que misturou guitarra elétrica, MPB, teatro e artes visuais numa provocação à cultura brasileira. Caetano Veloso e Gilberto Gil foram seus líderes, presos e exilados pela ditadura."},
  {id:141,type:"tf",cat:"Natureza",diff:"medium",q:"O pirarucu é o maior peixe escamoso de água doce do mundo.",ans:true,exp:"Correto. O pirarucu (Arapaima gigas) pode ultrapassar 3 metros e 200 kg. É nativo da Amazônia e é considerado o maior peixe escamoso de água doce do planeta."},
  {id:142,type:"tf",cat:"Cultura",diff:"easy",q:"O Carnaval do Rio de Janeiro é o maior do mundo em número de participantes.",ans:true,exp:"Correto. O Carnaval do Rio de Janeiro é reconhecido como o maior carnaval do mundo pelo Guinness World Records, reunindo milhões de pessoas entre foliões locais e turistas internacionais."},
  {id:143,type:"tf",cat:"Política",diff:"hard",q:"O Brasil aderiu ao Tratado de Não Proliferação Nuclear (TNP) em 1998.",ans:true,exp:"Correto. O Brasil, que chegou a desenvolver um programa nuclear secreto durante a ditadura, aderiu ao TNP em 1998, comprometendo-se com o uso pacífico da energia nuclear."},
  {id:144,type:"tf",cat:"Natureza",diff:"medium",q:"O mangue é um ecossistema exclusivo da costa nordestina do Brasil.",ans:false,exp:"Errado. Os manguezais ocorrem em todo o litoral brasileiro, do Amapá ao Sul do país. O Brasil tem a maior área de manguezais do mundo — mais de 1 milhão de hectares, concentrados principalmente no Maranhão e Pará."},
  {id:145,type:"tf",cat:"Ciência",diff:"medium",q:"O Brasil tem o maior programa de biocombustíveis do mundo.",ans:true,exp:"Correto. Com o Proálcool (1975) e a Política Nacional de Biocombustíveis, o Brasil tem o maior e mais desenvolvido programa de biocombustíveis do mundo, sendo o maior produtor e exportador de etanol de cana-de-açúcar."},
  {id:146,type:"tf",cat:"História",diff:"hard",q:"A Semana de Arte Moderna de 1922 ocorreu em São Paulo e durou uma semana.",ans:true,exp:"Correto. A Semana de Arte Moderna de 1922 ocorreu no Teatro Municipal de São Paulo entre 11 e 18 de fevereiro — exatamente uma semana. Foi o marco inaugural do modernismo brasileiro, com escândalo e vaias do público conservador."},
  {id:147,type:"tf",cat:"Fauna",diff:"hard",q:"O mico-leão-dourado é exclusivo da Mata Atlântica do estado do Rio de Janeiro.",ans:true,exp:"Correto. O mico-leão-dourado (Leontopithecus rosalia) é endêmico da Mata Atlântica da região serrana fluminense. Considerado símbolo da conservação global, foi retirado da lista de extinção crítica após programas de reintrodução."},
  {id:148,type:"tf",cat:"Economia",diff:"easy",q:"São Paulo é a maior cidade da América Latina.",ans:true,exp:"Correto. São Paulo é a maior cidade da América Latina com mais de 12 milhões de habitantes no município e cerca de 22 milhões na região metropolitana — a maior aglomeração urbana do hemisfério sul."},
  {id:149,type:"tf",cat:"Cultura",diff:"medium",q:"A umbanda é uma religião brasileira criada no século XX.",ans:true,exp:"Correto. A umbanda surgiu no Brasil na década de 1920–1930, em Niterói (RJ). É uma religião genuinamente brasileira que mistura elementos do candomblé, do espiritismo kardecista, do catolicismo e das tradições indígenas."},
  {id:150,type:"tf",cat:"Natureza",diff:"easy",q:"O Brasil tem mais de 55.000 espécies de plantas catalogadas.",ans:true,exp:"Correto. O Brasil tem mais de 55.000 espécies de plantas catalogadas — a maior flora do mundo. A Amazônia sozinha concentra cerca de 40.000 espécies vegetais."},
  {id:151,type:"mc",cat:"Natureza",diff:"hard",q:"O que é o 'arco do desmatamento' na Amazônia brasileira?",opts:["Uma curva geográfica do Rio Amazonas no Pará","A faixa de maior desmatamento que vai do Pará ao Mato Grosso, na borda sul da floresta","Um projeto de reflorestamento em arco ao longo do litoral amazônico","O contorno da bacia hidrográfica do Rio Tapajós"],ans:1,exp:"O 'arco do desmatamento' é a faixa que vai do leste do Pará, Maranhão, Tocantins, sul do Pará, norte do Mato Grosso e Rondônia — borda sul e leste da Amazônia. É onde ocorre a maior pressão de desmatamento por expansão agropecuária."},
  {id:152,type:"mc",cat:"História",diff:"medium",q:"O que foi o Estado Novo (1937–1945)?",opts:["O primeiro governo democrático após a Proclamação da República","A ditadura de Getúlio Vargas, inspirada no fascismo europeu, com censura e supressão de partidos","O período de governo de Eurico Gaspar Dutra após a Segunda Guerra","A fase final do Império de Dom Pedro II"],ans:1,exp:"O Estado Novo foi a ditadura de Getúlio Vargas de 1937 a 1945, inspirada nos regimes fascistas europeus. Vargas governou por decreto, fechou o Congresso, censurou a imprensa e criou a CLT (Consolidação das Leis do Trabalho) — seu legado mais duradouro."},
  {id:153,type:"mc",cat:"Cultura",diff:"medium",q:"O que é o Círio de Nazaré e onde ocorre?",opts:["Uma procissão religiosa em Salvador que homenageia Nossa Senhora da Conceição","A maior festa religiosa do Brasil, em Belém do Pará, em outubro, em homenagem a Nossa Senhora de Nazaré","Um festival de folclore amazônico em Manaus","Uma romaria anual em Aparecida do Norte (SP)"],ans:1,exp:"O Círio de Nazaré ocorre em Belém do Pará, na segunda semana de outubro. A procissão da imagem de Nossa Senhora de Nazaré reúne mais de 2 milhões de fiéis — é considerada a maior procissão católica do mundo."},
  {id:154,type:"mc",cat:"Economia",diff:"hard",q:"O que foi o Plano Real e em que ano foi lançado?",opts:["Um plano de distribuição de renda de Lula em 2003","O plano econômico que estabilizou a moeda brasileira, lançado em 1994 por Fernando Henrique Cardoso e Itamar Franco","Um plano de industrialização de Juscelino Kubitschek nos anos 1950","Um acordo de renegociação da dívida externa do Brasil nos anos 1980"],ans:1,exp:"O Plano Real foi lançado em 1° de julho de 1994, durante o governo Itamar Franco, pelo então ministro Fernando Henrique Cardoso. Controlou a hiperinflação que chegava a 80% ao mês e criou a moeda Real, que existe até hoje."},
  {id:155,type:"mc",cat:"Natureza",diff:"medium",q:"Qual é o principal rio do Pantanal?",opts:["Rio Araguaia","Rio Paraguai","Rio Cuiabá","Rio Miranda"],ans:1,exp:"O Rio Paraguai é o principal rio do Pantanal, percorrendo a planície de norte a sul. É ele quem provoca as inundações sazonais que definem o Pantanal. Nasce em Mato Grosso e vai até o Prata, na Argentina."},
  {id:156,type:"mc",cat:"História",diff:"easy",q:"O que é a Emancipação de 13 de Maio?",opts:["A data da proclamação da República do Brasil","A data da assinatura da Lei Áurea, que aboliu a escravidão no Brasil em 1888","A data da Independência do Brasil em 1822","A data da morte de Zumbi dos Palmares"],ans:1,exp:"13 de Maio de 1888 é a data em que a Princesa Isabel assinou a Lei Áurea, abolindo oficialmente a escravidão no Brasil. O país foi o último das Américas a fazê-lo, 66 anos após a independência."},
  {id:157,type:"mc",cat:"Ciência",diff:"medium",q:"O que é o SIVAM?",opts:["Sistema de vigilância da Amazônia que monitora tráfico, desmatamento e fronteiras via radar e satélite","Sistema de vacinação da Amazônia coordenado pelo Ministério da Saúde","Sistema de irrigação do Vale do Amazonas criado pela EMBRAPA","Satélite de monitoramento ambiental do INPE"],ans:0,exp:"O SIVAM (Sistema de Vigilância da Amazônia), operacional desde 2002, é um dos maiores sistemas de vigilância territorial do mundo. Cobre 5,2 milhões de km² com radares, sensores e aviões para monitorar fronteiras, tráfico e meio ambiente."},
  {id:158,type:"mc",cat:"Fauna",diff:"medium",q:"O que é o boto-cor-de-rosa e qual sua importância cultural na Amazônia?",opts:["Um peixe de água doce usado na medicina tradicional ribeirinha","O maior cetáceo de água doce do mundo, figura central de lendas amazônicas sobre sedução e transformação","Uma espécie de lontra do Rio Amazonas, considerada sagrada pelos Kayapó","Um tipo de golfinho marinho que sobe o Rio Amazonas durante a cheia"],ans:1,exp:"O boto-cor-de-rosa (Inia geoffrensis) é o maior cetáceo de água doce do mundo. No imaginário amazônico, ele se transforma em homem bonito à noite para seduzir mulheres — o 'encantado'. É figura central no folclore ribeirinho e símbolo da cultura amazônica."},
  {id:159,type:"mc",cat:"Arte",diff:"hard",q:"O que foi a Semana de Arte Moderna de 1922 e quais artistas participaram?",opts:["Uma exposição de arte colonial portuguesa em São Paulo, com Cândido Portinari e Di Cavalcanti","Evento realizado no Teatro Municipal de SP com Anita Malfatti, Oswald de Andrade, Mário de Andrade e Di Cavalcanti, marco do modernismo","Um festival de música erudita com Villa-Lobos e Carlos Gomes no Rio de Janeiro","Uma mostra de arte indígena organizada por Darcy Ribeiro em Brasília"],ans:1,exp:"A Semana de Arte Moderna de 1922 foi realizada no Teatro Municipal de São Paulo. Participaram Anita Malfatti, Di Cavalcanti, Mário de Andrade, Oswald de Andrade, Manuel Bandeira e Villa-Lobos. O evento rompeu com o academicismo e inaugurou o modernismo no Brasil."},
  {id:160,type:"mc",cat:"Indígenas",diff:"hard",q:"Qual é o povo indígena mais numeroso do Brasil atualmente?",opts:["Yanomami","Tikuna","Guarani Kaiowá","Xavante"],ans:1,exp:"Os Tikuna (ou Ticuna) são o povo indígena mais numeroso do Brasil, com cerca de 53.000 pessoas, vivendo principalmente no Alto Solimões, no Amazonas, além de Peru e Colômbia."},
  {id:161,type:"tf",cat:"Natureza",diff:"hard",q:"O ninho da formiga cortadeira pode atingir 8 metros de profundidade.",ans:true,exp:"Correto. Os formigueiros de Atta (saúvas) podem atingir 8 metros de profundidade e ter mais de 1.000 câmaras. São as maiores estruturas construídas por qualquer animal, proporcionalmente ao tamanho do construtor."},
  {id:162,type:"tf",cat:"Cultura",diff:"medium",q:"Hélio Oiticica foi um artista plástico brasileiro pioneiro da arte conceitual mundial.",ans:true,exp:"Correto. Hélio Oiticica (1937–1980) foi um dos artistas mais inovadores do século XX. Seus 'Parangolés' (capas para usar) e 'Penetráveis' anteciparam a arte interativa e participativa globalmente."},
  {id:163,type:"tf",cat:"Economia",diff:"medium",q:"O Brasil é o maior produtor mundial de açúcar de cana.",ans:true,exp:"Correto. O Brasil é o maior produtor e exportador mundial de açúcar de cana, respondendo por cerca de 20–25% da produção global, concentrada principalmente em São Paulo."},
  {id:164,type:"tf",cat:"História",diff:"medium",q:"A Revolução Constitucionalista de 1932 foi o único conflito armado entre brasileiros após a Proclamação da República.",ans:false,exp:"Errado. O Brasil teve vários conflitos armados após 1889: Guerra de Canudos (1896–97), Guerra do Contestado (1912–16), Revoluções Tenentistas (1922–30), e a própria Revolução de 1930. A de 1932 foi a mais intensa, mas não a única."},
  {id:165,type:"tf",cat:"Natureza",diff:"easy",q:"O lobo-guará é o maior canídeo selvagem da América do Sul.",ans:true,exp:"Correto. O lobo-guará (Chrysocyon brachyurus) é o maior canídeo silvestre da América do Sul, com pernas longas adaptadas para ver por cima da vegetação do Cerrado. Está ameaçado de extinção."},
  {id:166,type:"tf",cat:"Política",diff:"medium",q:"O Brasil é membro permanente do Conselho de Segurança da ONU.",ans:false,exp:"Errado. O Brasil não é membro permanente do Conselho de Segurança da ONU. Os cinco membros permanentes são EUA, Reino Unido, França, Rússia e China. O Brasil já foi membro rotativo diversas vezes e reivindica um assento permanente."},
  {id:167,type:"tf",cat:"Cultura",diff:"hard",q:"Villa-Lobos foi o compositor brasileiro que mais criou obras — são mais de 1.000 composições.",ans:true,exp:"Correto. Heitor Villa-Lobos (1887–1959) compôs mais de 1.000 obras, tornando-se o compositor mais prolífico das Américas. Suas Bachianas Brasileiras e Choros são obras-primas que fundem música clássica europeia com ritmos e melodias populares brasileiros."},
  {id:168,type:"tf",cat:"Natureza",diff:"medium",q:"O pau-brasil (Caesalpinia echinata) está extinto na natureza.",ans:false,exp:"Errado. O pau-brasil não está extinto, mas é classificado como 'em perigo crítico' de extinção pela IUCN. Existem populações remanescentes na Mata Atlântica, principalmente na Bahia e em Pernambuco, além de programas de replantio."},
  {id:169,type:"tf",cat:"Ciência",diff:"hard",q:"O Brasil opera um reator nuclear e produz seu próprio combustível nuclear.",ans:true,exp:"Correto. O Brasil opera o reator IEA-R1 no IPEN (São Paulo) e tem a usina de enriquecimento de urânio em Resende (RJ), sendo um dos poucos países do mundo a dominar o ciclo completo do combustível nuclear — da mineração ao enriquecimento."},
  {id:170,type:"tf",cat:"Economia",diff:"easy",q:"O Real é a moeda mais estável da história do Brasil.",ans:false,exp:"Errado na afirmação absoluta. O Real (desde 1994) é a moeda mais duradoura e estável do período republicano recente, mas o Brasil já teve moedas relativamente estáveis antes. Ao longo do século XX, o Brasil teve 9 moedas diferentes — réis, cruzeiro, cruzado, cruzeiro real e outros."},
  {id:171,type:"mc",cat:"Fauna",diff:"hard",q:"Qual ave é conhecida como 'galo-da-serra' e é símbolo do Cerrado?",opts:["Seriema","Mutum","Jacutinga","Arara-canindé"],ans:0,exp:"A seriema (Cariama cristata) é uma ave típica do Cerrado, conhecida por seu grito penetrante. É predadora ativa que caça serpentes, insetos e pequenos vertebrados. Está entre as aves mais antigas evolutivamente — parente distante dos falcões."},
  {id:172,type:"mc",cat:"História",diff:"hard",q:"O que foi a 'Operação Condor'?",opts:["Uma operação militar brasileira na Guerra do Paraguai","Uma rede de cooperação entre ditaduras sul-americanas (Brasil, Argentina, Chile, Uruguai) para perseguir opositores nos anos 1970","Um programa secreto de desenvolvimento nuclear durante a ditadura","Uma operação de contrainteligência da CIA no Brasil"],ans:1,exp:"A Operação Condor foi uma aliança secreta entre as ditaduras do Cone Sul (Brasil, Argentina, Chile, Uruguai, Paraguai, Bolívia) para perseguir, sequestrar, torturar e matar opositores políticos nos anos 1970. O Brasil participou ativamente."},
  {id:173,type:"mc",cat:"Natureza",diff:"medium",q:"O que é o 'lavrado' de Roraima?",opts:["Uma formação florestal densa de transição entre Amazônia e Cerrado","Uma savana natural de Roraima, o único ecossistema de savana amazônica do Brasil","Um tipo de campo rupestre do planalto das Guianas","Uma área de várzea inundável no norte do Amazonas"],ans:1,exp:"O lavrado é a savana natural de Roraima — o único ecossistema de savana amazônica do Brasil, com flora e fauna únicas. Faz parte de um corredor de savanas que vai até a Venezuela. Abriga povos como os Yanomami e Macuxi."},
  {id:174,type:"mc",cat:"Cultura",diff:"easy",q:"O que é o bumba-meu-boi do Maranhão?",opts:["Uma corrida de bois realizada nas festas juninas","O auto folclórico mais importante do Maranhão, com boi que morre e ressuscita — Patrimônio da Humanidade","Uma dança de salão típica do interior maranhense","Um festival gastronômico com pratos à base de carne bovina"],ans:1,exp:"O Bumba-meu-boi do Maranhão foi inscrito como Patrimônio Cultural Imaterial da Humanidade pela UNESCO em 2019. É o festival folclórico mais importante do estado, com grupos que se preparam o ano todo e apresentações que chegam a 200 pessoas."},
  {id:175,type:"mc",cat:"Economia",diff:"medium",q:"Qual região do Brasil concentra a maior parte do PIB nacional?",opts:["Nordeste","Norte","Centro-Oeste","Sudeste"],ans:3,exp:"O Sudeste concentra cerca de 53–55% do PIB brasileiro. São Paulo sozinho responde por aproximadamente 32% do PIB nacional — mais do que qualquer outra unidade federativa. Rio de Janeiro e Minas Gerais completam a concentração."},
  {id:176,type:"mc",cat:"Natureza",diff:"hard",q:"O que é a 'Floresta Ombrófila Densa'?",opts:["O nome técnico para a Mata Atlântica de encosta, com alta pluviosidade e densa cobertura vegetal","Uma floresta de araucárias do Sul do Brasil","O nome científico para a floresta de igapó na Amazônia","O tipo de vegetação de transição entre Cerrado e Pantanal"],ans:0,exp:"A Floresta Ombrófila Densa é o nome técnico da Mata Atlântica de encosta — caracterizada por alta pluviosidade (ombro = chuva, filo = amigo), baixa sazonalidade e densa cobertura. É uma das florestas mais biodiversas do planeta."},
  {id:177,type:"mc",cat:"Indígenas",diff:"medium",q:"Qual é o maior povo indígena do Brasil em número de pessoas?",opts:["Guarani","Tikuna","Yanomami","Kayapó"],ans:1,exp:"Os Tikuna são o povo indígena mais numeroso do Brasil, com cerca de 53.000 pessoas vivendo principalmente no Alto Solimões (AM). São conhecidos por sua rica produção artesanal e resistência cultural."},
  {id:178,type:"mc",cat:"Ciência",diff:"medium",q:"O que é o BUTANTAN e qual sua principal contribuição?",opts:["Instituto de pesquisas nucleares de São Paulo","Instituto de pesquisas biológicas de São Paulo, maior produtor de soros antiofídicos do mundo","Centro de pesquisa agrícola da EMBRAPA em São Paulo","Laboratório de biotecnologia da USP especializado em vacinas tropicais"],ans:1,exp:"O Instituto Butantan (1901) é o maior produtor de soros e vacinas da América Latina. Produz soros contra venenos de cobras, aranhas e escorpiões — distribuídos gratuitamente pelo SUS — e vacinas como CoronaVac (produzida em parceria com a Sinovac)."},
  {id:179,type:"mc",cat:"Cultura",diff:"hard",q:"O que foi o movimento Antropofágico e quem o criou?",opts:["Um movimento gastronômico que valorizava a culinária indígena, criado por Alex Atala nos anos 2000","Um manifesto cultural de 1928 que propunha 'devorar' as influências estrangeiras e transformá-las em algo brasileiro, criado por Oswald de Andrade","Uma corrente filosófica de Darcy Ribeiro sobre a identidade mestiça do Brasil","Uma tendência artística que usava elementos da arte indígena, criada por Tarsila do Amaral"],ans:1,exp:"O Manifesto Antropófago (1928) de Oswald de Andrade propunha que o Brasil 'devorasse' a cultura europeia como os índios devoravam seus inimigos — assimilando o que era útil e transformando em algo novo e brasileiro. Inspirou o Tropicalismo nos anos 1960."},
  {id:180,type:"mc",cat:"Natureza",diff:"easy",q:"Qual é o bioma exclusivo do Nordeste brasileiro, famoso pela vegetação resistente à seca?",opts:["Pampa","Pantanal","Caatinga","Cerrado"],ans:2,exp:"A Caatinga é o único bioma exclusivamente brasileiro. Cobre cerca de 10% do território nacional, principalmente no semiárido nordestino. Apesar da aparência árida, tem enorme biodiversidade única, com mais de 5.000 espécies vegetais."},
