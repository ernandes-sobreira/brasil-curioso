  {id:181,type:"tf",cat:"Natureza",diff:"medium",q:"O cervo-do-pantanal é o maior cervo da América do Sul.",ans:true,exp:"Correto. O cervo-do-pantanal (Blastocerus dichotomus) é o maior cervo das Américas do Sul, podendo atingir 150 kg. Vive em áreas alagáveis e tem cascos adaptados para andar em terrenos encharcados."},
  {id:182,type:"tf",cat:"Cultura",diff:"hard",q:"O Brasil é o maior país católico do mundo em número absoluto de fiéis.",ans:true,exp:"Correto. Embora a proporção de católicos esteja diminuindo, o Brasil ainda tem o maior número absoluto de católicos do mundo — mais de 120 milhões de pessoas, segundo o Censo 2010. Mais do que qualquer país europeu."},
  {id:183,type:"tf",cat:"Economia",diff:"medium",q:"O Brasil foi o primeiro país a realizar eleições totalmente eletrônicas.",ans:true,exp:"Correto. O Brasil pioneirou o voto eletrônico em escala nacional em 1996, sendo o primeiro país do mundo a realizar eleições completamente informatizadas. O sistema da urna eletrônica é exportado como modelo para outros países."},
  {id:184,type:"tf",cat:"Natureza",diff:"hard",q:"O Brasil tem mais espécies de anfíbios do que qualquer outro país.",ans:true,exp:"Correto. O Brasil é o país com maior diversidade de anfíbios do mundo — mais de 1.050 espécies de sapos, rãs e salamandras catalogadas. A Amazônia e a Mata Atlântica são os dois centros dessa diversidade."},
  {id:185,type:"tf",cat:"História",diff:"medium",q:"A estrada de ferro Madeira-Mamoré, no Amazonas, ficou conhecida como 'ferrovia do diabo'.",ans:true,exp:"Correto. A Estrada de Ferro Madeira-Mamoré (Rondônia), construída entre 1907 e 1912, ficou conhecida como 'ferrovia do diabo' pelo enorme número de mortes durante a construção — estima-se entre 6.000 e 30.000 trabalhadores mortos por malária, acidentes e violência."},
  {id:186,type:"tf",cat:"Ciência",diff:"easy",q:"O Brasil tem o maior sistema de saúde pública universal do mundo.",ans:true,exp:"Correto. O SUS (Sistema Único de Saúde), criado pela Constituição de 1988, é o maior sistema de saúde pública do mundo em termos de população atendida — mais de 210 milhões de pessoas com acesso universal e gratuito."},
  {id:187,type:"tf",cat:"Fauna",diff:"medium",q:"A jaguatirica é o mesmo animal que a onça-pintada.",ans:false,exp:"Errado. A jaguatirica (Leopardus pardalis) e a onça-pintada (Panthera onca) são felinos completamente diferentes. A onça-pintada pode pesar 120 kg; a jaguatirica raramente ultrapassa 16 kg. Ambas têm manchas, mas são espécies distintas."},
  {id:188,type:"tf",cat:"Política",diff:"hard",q:"A UNASUL foi uma iniciativa diplomática brasileira para integrar a América do Sul.",ans:true,exp:"Correto. A UNASUL (União de Nações Sul-Americanas), criada em 2008, foi em grande parte uma iniciativa brasileira de integração regional. O Brasil foi o maior financiador da organização, que entrou em crise após 2018 com a saída de vários membros."},
  {id:189,type:"tf",cat:"Natureza",diff:"hard",q:"O Rio São Francisco é o único rio de grande porte que nasce e deságua inteiramente no território brasileiro.",ans:true,exp:"Correto. O Rio São Francisco, conhecido como 'Velho Chico', nasce em Minas Gerais (Serra da Canastra) e deságua no Atlântico na divisa de Alagoas e Sergipe — percorrendo 2.863 km inteiramente em território brasileiro."},
  {id:190,type:"tf",cat:"Cultura",diff:"medium",q:"O Instituto do Patrimônio Histórico e Artístico Nacional (IPHAN) tombou o primeiro bem em 1938.",ans:true,exp:"Correto. O IPHAN foi criado em 1937 (como SPHAN) e realizou seus primeiros tombamentos em 1938, incluindo a Igreja Nossa Senhora do Carmo, em Alcântara (MA), e o conjunto arquitetônico e urbanístico de Ouro Preto (MG)."},
  {id:191,type:"mc",cat:"Economia",diff:"hard",q:"O que é o BNDES?",opts:["Banco Nacional de Desenvolvimento Econômico e Social, principal financiador do desenvolvimento brasileiro","Banco do Nordeste de Desenvolvimento Sustentável","Banco Nacional de Defesa e Segurança","Bolsa Nacional de Desenvolvimento Econômico Sustentável"],ans:0,exp:"O BNDES (Banco Nacional de Desenvolvimento Econômico e Social), criado em 1952, é o principal agente de financiamento do desenvolvimento brasileiro. Financia infraestrutura, indústria, agricultura e exportações, sendo um dos maiores bancos de desenvolvimento do mundo."},
  {id:192,type:"mc",cat:"História",diff:"medium",q:"O que foi a Balaiada (1838–1841)?",opts:["Uma revolta de escravizados e mestiços no Maranhão contra o domínio dos 'Bem-te-vis'","Uma insurreição de indígenas no Pará liderada por pajés","Uma revolta liberal em São Paulo contra o Período Regencial","Uma guerra de independência no Maranhão contra o governo do Rio de Janeiro"],ans:0,exp:"A Balaiada foi uma revolta popular de escravizados, indígenas e camponeses livres no Maranhão (1838–1841), liderada por Manuel Francisco dos Anjos Ferreira ('o Balaio') e Raimundo Gomes. Combatia a opressão dos grandes proprietários apoiados pelo governo imperial."},
  {id:193,type:"mc",cat:"Fauna",diff:"medium",q:"O que é o 'canto da seriema' e qual seu papel no Cerrado?",opts:["Um grito de alerta para predadores, que serve de alarme para outros animais do Cerrado","Uma chamada de acasalamento que só ocorre à noite","O som que a seriema usa para atrair presas","Um canto territorial emitido apenas durante a seca"],ans:0,exp:"O grito da seriema, audível a vários quilômetros, funciona como alarme para toda a comunidade animal do Cerrado. Outros animais reconhecem seu chamado de alerta e reagem fugiram de predadores — tornando-a um sentinel natural do bioma."},
  {id:194,type:"mc",cat:"Natureza",diff:"hard",q:"Qual é a principal ameaça ao Cerrado atualmente?",opts:["Mineração ilegal de ouro","Expansão da agropecuária, principalmente soja e pecuária bovina","Urbanização acelerada das cidades do Centro-Oeste","Queimadas causadas por indígenas durante rituais tradicionais"],ans:1,exp:"A principal ameaça ao Cerrado é a expansão da fronteira agropecuária — especialmente a soja e a pecuária bovina do MATOPIBA (Maranhão, Tocantins, Piauí e Bahia). O Cerrado perdeu mais de 50% de sua cobertura original e não tem as mesmas proteções legais da Amazônia."},
  {id:195,type:"mc",cat:"Cultura",diff:"medium",q:"Qual é o maior evento de literatura do Brasil?",opts:["Feira do Livro de Porto Alegre","FLIP — Festa Literária Internacional de Paraty","Bienal do Livro de São Paulo","Salão do Livro de Recife"],ans:2,exp:"A Bienal do Livro de São Paulo é o maior evento literário do Brasil e um dos maiores do mundo, realizado bienalmente com mais de 700.000 visitantes por edição. A FLIP de Paraty é a mais prestigiada internacionalmente, mas a Bienal é a maior em público."},
  {id:196,type:"mc",cat:"Ciência",diff:"medium",q:"O que é o Projeto Genoma Humano no Brasil?",opts:["Uma iniciativa brasileira para sequenciar o genoma de populações amazônicas","O Brasil participou do Projeto Genoma Humano internacional e foi o único país em desenvolvimento a contribuir com sequenciamento","Um programa da FAPESP para mapear o genoma da cana-de-açúcar","Uma pesquisa do INPA sobre o DNA das árvores da Amazônia"],ans:1,exp:"O Brasil foi o único país em desenvolvimento a participar do Consórcio Internacional do Genoma Humano, sequenciando o cromossomo 22. A FAPESP coordenou a participação brasileira com pesquisadores da USP, UNICAMP e outras instituições."},
  {id:197,type:"mc",cat:"Natureza",diff:"easy",q:"Qual é o principal afluente do Rio Amazonas pelo lado sul?",opts:["Rio Negro","Rio Tapajós","Rio Madeira","Rio Xingu"],ans:2,exp:"O Rio Madeira é o principal afluente do Amazonas pelo lado sul — e o maior afluente em volume de água. Nasce na Bolívia e Perú e percorre 3.250 km até encontrar o Amazonas próximo a Itacoatiara (AM)."},

  {id:199,type:"mc",cat:"Economia",diff:"easy",q:"O que significa a sigla BRICS?",opts:["Brasil, Rússia, Índia, China e África do Sul — bloco de economias emergentes","Brasil, Romênia, Irlanda, Colômbia e Suécia — países exportadores de commodities","Brasil, Rússia, Israel, Chile e Suíça — parceiros comerciais do G7","Bloco de países da América Latina liderado pelo Brasil"],ans:0,exp:"BRICS é a sigla para Brasil, Rússia, Índia, China e África do Sul — as maiores economias emergentes do mundo. O grupo, criado em 2009, busca reformar a governança global e representa cerca de 40% da população mundial e 25% do PIB global."},
  {id:200,type:"mc",cat:"Identidade",diff:"medium",q:"Por que o Brasil é chamado de 'País do Futuro' — e quem criou essa expressão?",opts:["O presidente Getúlio Vargas, em discurso sobre industrialização nos anos 1940","O escritor austríaco Stefan Zweig, no livro 'Brasil, País do Futuro' (1941), celebrando a diversidade e potencial brasileiro","O economista americano que criou o termo BRICS ao descrever o crescimento brasileiro","O poeta Carlos Drummond de Andrade, em crônica sobre o desenvolvimentismo de JK"],ans:1,exp:"A expressão 'Brasil, País do Futuro' é título do livro de Stefan Zweig publicado em 1941, quando o escritor austríaco exilado se encantou com a harmonia racial e o potencial do Brasil. A expressão tornou-se parte da identidade nacional — às vezes usada com ironia sobre promessas não cumpridas."},
];

const ACHIEVEMENTS=[
  {id:"first",icon:"🌱",label:"Primeiro Passo",desc:"Respondeu a primeira pergunta",cond:s=>s.total>=1},
  {id:"streak5",icon:"🔥",label:"Em Chamas",desc:"5 acertos seguidos",cond:s=>s.streak>=5},
  {id:"fast",icon:"⚡",label:"Velocista",desc:"Acertou em menos de 3 segundos",cond:s=>s.lastTime<=3&&s.lastOk},
  {id:"perfect10",icon:"⭐",label:"Dez Perfeitos",desc:"10 acertos sem errar",cond:s=>s.streak>=10},
  {id:"scholar",icon:"🎓",label:"Sábio do Brasil",desc:"80% de acertos",cond:s=>s.total>=10&&(s.correct/s.total)>=0.8},
  {id:"hard3",icon:"💎",label:"Corajoso",desc:"3 questões difíceis acertadas",cond:s=>s.hardCorrect>=3},
];

// ===== ESTADO =====
let playerName="",queue=[],current=null,answered=false;
let score=0,correct=0,streak=0,maxStreak=0,total=0,combo=0,hardCorrect=0;
let timeLeft=0,timerMax=0,timerInt=null,lastTime=0,lastOk=false;
let unlockedAch=[];
try{unlockedAch=JSON.parse(localStorage.getItem("bcAch3")||"[]");}catch{}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ===== BOLHAS =====
let bubbleInt=null;
function resetBubbles(){
  clearInterval(bubbleInt);
  const wrap=document.getElementById('bubble-wrap');
  wrap.innerHTML='';
  // Emite bolhinhas periódicas enquanto o timer corre
  bubbleInt=setInterval(()=>{
    spawnBubble(wrap,'rise');
  },600);
}
function spawnBubble(wrap,type){
  const wrapW=wrap.offsetWidth||300;
  const b=document.createElement('span');
  b.className='bubble';
  const sz=type==='burst'? (8+Math.random()*10) : (4+Math.random()*6);
  b.style.width=sz+'px';
  b.style.height=sz+'px';
  b.style.left=Math.random()*Math.max(1,wrapW-sz)+'px';
  const dur=type==='burst'? (0.6+Math.random()*0.4) : (0.8+Math.random()*0.6);
  b.style.animation=(type==='burst'?'bubbleBurst':'bubbleRise')+' '+dur.toFixed(2)+'s ease-out forwards';
  wrap.appendChild(b);
  setTimeout(()=>b.remove(), dur*1000+100);
}
function burstBubbles(){
  clearInterval(bubbleInt);
  const wrap=document.getElementById('bubble-wrap');
  // Dispara várias bolhas de uma vez simulando fuga
  for(let i=0;i<12;i++){
    setTimeout(()=>spawnBubble(wrap,'burst'), i*60);
  }
}

// ===== JOGO =====
function startGame(){
  const n=document.getElementById('name-in').value.trim();
  if(!n){document.getElementById('name-in').focus();return;}
  playerName=n;
  const q=shuffle(QUESTIONS).slice(0,TOTAL_QS);
  queue=q.slice(1);current=q[0];
  answered=false;score=0;correct=0;streak=0;maxStreak=0;total=0;combo=0;hardCorrect=0;
  showScreen('game');
  renderQ();
}

function renderQ(){
  const done=TOTAL_QS-queue.length-1;
  document.getElementById('q-count').textContent='Pergunta '+(done+1)+' de '+TOTAL_QS;
  document.getElementById('g-score').textContent=score;
  document.getElementById('g-streak').textContent=streak>=3?'🔥×'+streak:'';
  document.getElementById('g-prog').style.width=Math.round((done/TOTAL_QS)*100)+'%';

  const db=document.getElementById('diff-b');
  db.textContent=DIFF_LABEL[current.diff];
  db.className='diff-badge d-'+current.diff;
  const cb=document.getElementById('cat-b');
  cb.textContent=current.cat;cb.style.background=CAT_COLORS[current.cat]||'#2d6a4f';
  document.getElementById('type-lbl').textContent=current.type==='tf'?'· Verdadeiro ou Falso':'· Múltipla escolha';
  document.getElementById('q-txt').textContent=current.q;

  document.getElementById('tf-area').style.display='none';
  document.getElementById('mc-area').style.display='none';
  document.getElementById('exp-box').style.display='none';
  document.getElementById('btn-next').style.display='none';

  const tt=document.getElementById('tf-true'),tf=document.getElementById('tf-false');
  tt.className='ans-btn';tt.disabled=false;
  tf.className='ans-btn';tf.disabled=false;

  if(current.type==='tf'){
    document.getElementById('tf-area').style.display='grid';
  } else {
    const mc=document.getElementById('mc-area');
    mc.style.display='flex';mc.innerHTML='';
    const L=['A','B','C','D'];
    current.opts.forEach((o,i)=>{
      const b=document.createElement('button');b.className='ans-btn';b.dataset.idx=i;
      b.innerHTML='<span class="mc-letter" id="ml'+i+'">'+L[i]+'</span>'+o;
      b.onclick=()=>answerMC(i);mc.appendChild(b);
    });
  }

  resetBubbles();
  timerMax=DIFF_TIME[current.diff];timeLeft=timerMax;
  clearInterval(timerInt);updateTimer();
  timerInt=setInterval(()=>{
    timeLeft=Math.max(0,timeLeft-0.1);
    updateTimer();
    if(timeLeft<=0){clearInterval(timerInt);timeExpired();}
  },100);
}

function updateTimer(){
  const pct=Math.max(0,(timeLeft/timerMax)*100);
  const bar=document.getElementById('t-bar');
  bar.style.width=pct+'%';
  bar.style.background=pct>50?'#009c3b':pct>25?'#ffa000':'#dc3232';
  const v=document.getElementById('t-val');
  v.textContent=Math.ceil(timeLeft)+'s';
  v.style.color=pct>50?'#a8d5b5':pct>25?'#ffd070':'#ff7070';

}

function timeExpired(){
  if(answered)return;
  burstBubbles();
  // Pequeno delay para a animação aparecer antes de processar
  setTimeout(()=>processAns(false,-1),800);
}

function answerTF(val){
  if(answered)return;clearInterval(timerInt);
  const isOk=val===current.ans;
  const tt=document.getElementById('tf-true'),tf=document.getElementById('tf-false');
  tt.disabled=true;tf.disabled=true;
  if(current.ans===true)tt.classList.add('ans-correct');else tf.classList.add('ans-correct');
  if(val!==current.ans)(val===true?tt:tf).classList.add('ans-wrong');
  processAns(isOk,val);
}

function answerMC(idx){
  if(answered)return;clearInterval(timerInt);
  const isOk=idx===current.ans;
  document.querySelectorAll('#mc-area .ans-btn').forEach(b=>{
    b.disabled=true;const i=parseInt(b.dataset.idx);
    if(i===current.ans){b.classList.add('ans-correct');const ml=document.getElementById('ml'+i);if(ml)ml.classList.add('ml-correct');}
    else if(i===idx&&!isOk)b.classList.add('ans-wrong');
  });
  processAns(isOk,idx);
}

function processAns(isOk,choice){
  answered=true;
  const elapsed=timerMax-timeLeft;lastTime=elapsed;lastOk=isOk;
  total++;
  streak=isOk?streak+1:0;combo=isOk?combo+1:0;
  maxStreak=Math.max(maxStreak,streak);
  if(isOk){correct++;if(current.diff==='hard')hardCorrect++;}

  let pts=0;
  if(isOk){
    const base=DIFF_PTS[current.diff];
    const timePct=Math.max(0,timeLeft/timerMax);
    const timeBonus=Math.round(base*timePct*0.5);
    const comboBonus=combo>=3?Math.floor(combo/3)*5:0;
    pts=base+timeBonus+comboBonus;score+=pts;
  }

  document.getElementById('g-score').textContent=score;
  document.getElementById('g-streak').textContent=streak>=3?'🔥×'+streak:'';

  const eb=document.getElementById('exp-box');
  eb.className='exp-box '+(isOk?'exp-ok':'exp-bad');eb.style.display='block';
  let title=isOk?'✅ Correto! +'+pts+' pts':'❌ '+(choice===-1?'Tempo esgotado! O peixe fugiu com a isca 🐟':'Incorreto');
  if(combo>=3&&isOk)title+=' (combo 🔥)';
  document.getElementById('exp-title').textContent=title;
  document.getElementById('exp-text').textContent=current.exp;
  document.getElementById('btn-next').style.display='block';
  document.getElementById('btn-next').textContent=queue.length===0?'Ver resultado →':'Próxima pergunta →';

  checkAch({total,correct,streak,lastTime:elapsed,lastOk:isOk,hardCorrect});
}

function nextQuestion(){
  if(queue.length===0){showResult();return;}
  current=queue[0];queue=queue.slice(1);answered=false;renderQ();
}

function showResult(){
  saveToFirebase({
    name:playerName,score,correct,total,maxStreak,
    date:new Date().toLocaleDateString('pt-BR')
  });
  const pct=Math.round((correct/total)*100);
  document.getElementById('res-medal').textContent=pct>=90?'🏆':pct>=70?'🥈':pct>=50?'🥉':'🌱';
  document.getElementById('res-sub').textContent=playerName+', você completou as '+TOTAL_QS+' perguntas!';
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-corr').textContent=correct+'/'+total;
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-streak').textContent=maxStreak;
  showScreen('result');
}

function playAgain(){document.getElementById('name-in').value=playerName;showScreen('home');}

function confirmHome(){
  if(!answered&&total>0){if(!confirm('Sair agora? Seu progresso será perdido.'))return;}
  clearInterval(timerInt);showScreen('home');
}

// ===== RANKING GLOBAL =====
async function showRanking(){
  showScreen('ranking');
  document.getElementById('rank-list').innerHTML='<div class="rank-status">Carregando ranking global...</div>';
  const rows=await loadFromFirebase();
  const el=document.getElementById('rank-list');
  if(!rows.length){el.innerHTML='<div class="rank-status">Nenhuma partida ainda. Seja o primeiro!</div>';return;}
  const M=['🥇','🥈','🥉'];
  const RC=['rk-gold','rk-silver','rk-bronze','rk-normal'];
  el.innerHTML=rows.map((e,i)=>`
    <div class="rank-row ${RC[Math.min(i,3)]}">
      <span class="rank-pos">${M[i]||(i+1)+'º'}</span>
      <div style="flex:1">
        <div class="rank-name">${(e.name||'?').substring(0,20)}</div>
        <div class="rank-detail">${e.correct||0}/${e.total||20} acertos · seq.${e.maxStreak||0} · ${e.date||''}</div>
      </div>
      <span class="rank-pts">${e.score} pts</span>
    </div>
  `).join('');
}

// ===== CONQUISTAS =====
function checkAch(s){
  ACHIEVEMENTS.forEach(a=>{
    if(!unlockedAch.includes(a.id)&&a.cond(s)){
      unlockedAch.push(a.id);
      try{localStorage.setItem("bcAch3",JSON.stringify(unlockedAch));}catch{}
      showToast(a);
    }
  });
}
let toastT=null;
function showToast(a){
  document.getElementById('ach-ic').textContent=a.icon;
  document.getElementById('ach-name').textContent=a.label;
  document.getElementById('ach-desc').textContent=a.desc;
  const t=document.getElementById('ach-toast');t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3200);
}

document.getElementById('name-in').addEventListener('keydown',e=>{if(e.key==='Enter')startGame();});
</script>
