  {id:181,type:"tf",cat:"Natureza",diff:"medium",q:"O cervo-do-pantanal é o maior cervo da América do Sul.",ans:true,exp:"Correto. O cervo-do-pantanal (Blastocerus dichotomus) é o maior cervo das Américas do Sul, podendo atingir 150 kg. Vive em áreas alagáveis e tem cascos adaptados para andar em terrenos encharcados."},
  {id:182,type:"tf",cat:"Cultura",diff:"hard",q:"O Brasil é o maior país católico do mundo em número absoluto de fiéis.",ans:true,exp:"Correto. Embora a proporção de católicos esteja diminuindo, o Brasil ainda tem o maior número absoluto de católicos do mundo — mais de 120 milhões de pessoas, segundo o Censo 2010. Mais do que qualquer país europeu."},
  {id:183,type:"tf",cat:"Economia",diff:"medium",q:"O Brasil foi o primeiro país a realizar eleições totalmente eletrônicas.",ans:true,exp:"Correto. O Brasil pioneirou o voto eletrônico em escala nacional em 1996, sendo o primeiro país do mundo a realizar eleições completamente informatizadas. O sistema da urna eletrônica é exportado como modelo para outros países."},
  {id:184,type:"tf",cat:"Natureza",diff:"hard",q:"O Brasil tem mais espécies de anfíbios do que qualquer outro país.",ans:true,exp:"Correto. O Brasil é o país com maior diversidade de anfíbios do mundo — mais de 1.050 espécies de sapos, rãs e salamandras catalogadas. A Amazônia e a Mata Atlântica são os dois centros dessa diversidade."},
  {id:185,type:"tf",cat:"História",diff:"medium",q:"A estrada de ferro Madeira-Mamoré, no Amazonas, ficou conhecida como 'ferrovia do diabo'.",ans:true,exp:"Correto. A Estrada de Ferro Madeira-Mamoré (Rondônia), construída entre 1907 e 1912, ficou conhecida como 'ferrovia do diabo' pelo enorme número de mortes durante a construção — estima-se entre 6.000 e 30.000 trabalhadores mortos por malária, acidentes e violência."},
  {id:186,type:"tf",cat:"Ciência",diff:"easy",q:"O Brasil tem o maior sistema de saúde pública universal do mundo.",ans:true,exp:"Correto. O SUS (Sistema Único de Saúde), criado pela Constituição de 1988, é o maior sistema de saúde pública do mundo em termos de população atendida — mais de 210 milhões de pessoas com acesso universal e gratuito."},
  {id:187,type:"tf",cat:"Fauna",diff:"medium",q:"A jaguatirica é o mesmo animal que a onça-pintada.",ans:false,exp:"Errado. A jaguatirica (Leopardus pardalis) e a onça-pintada (Panthera onca) são felinos completamente diferentes. A onça-pintada pode pesar 120 kg; a jaguatirica raramente ultrapassa 16 kg. Ambas têm manchas, mas são espécies distintas."},
  {id:188,type:"tf",cat:"Política",diff:"hard",q:"A UNASUL foi uma iniciativa diplomática brasileira para integrar a América do Sul.",ans:true,exp:"Correto. A UNASUL (União de Nações Sul-Americanas), criada em 2008, foi em grande parte uma iniciativa brasileira de integração regional. O Brasil foi o maior financiador da organização, que entrou em crise após 2018 com a saída de vários membros."},
  {id:189,type:"tf",cat:"Natureza",diff:"hard",q:"O Rio São Francisco é o único rio de grande porte que nasce e deságua inteiramente no território brasileiro.",ans:true,exp:"Correto. O Rio São Francisco, conhecido como 'Velho Chico', nasce em Minas Gerais (Serra da Canastra) e deságua no Atlântico na divisa de Alagoas e Sergipe — percorrendo 2.863 km inteiramente em território brasileiro."},
  {id:190,type:"tf",cat:"Cultura",diff:"medium",q:"O Instituto do Patrimônio Histórico e Artístico Nacional (IPHAN) tombou o primeiro bem em 1938.",ans:true,exp:"Correto. O IPHAN foi criado em 1937 (como SPHAN) e realizou seus primeiros tombamentos em 1938, incluindo a Igreja Nossa Senhora do Carmo, em Alcântara (MA), e o conjunto arquitetônico e urbanístico de Ouro Preto (MG)."},
  {id:191,type:"mc",cat:"Economia",diff:"hard",q:"O que é o BNDES?",opts:["Banco Nacional de Desenvolvimento Econômico e Social, principal financiador do desenvolvimento brasileiro","Banco do Nordeste de Desenvolvimento Sustentável","Banco Nacional de Defesa e Segurança","Bolsa Nacional de Desenvolvimento Econômico Sustentável"],ans:0,exp:"O BNDES (Banco Nacional de Desenvolvimento Econômico e Social), criado em 1952, é o principal agente de financiamento do desenvolvimento brasileiro. Financia infraestrutura, indústria, agricultura e exportações, sendo um dos maiores bancos de desenvolvimento do mundo."},
  {id:192,type:"mc",cat:"História",diff:"medium",q:"O que foi a Balaiada (1838–1841)?",opts:["Uma revolta de escravizados e mestiços no Maranhão contra o domínio dos 'Bem-te-vis'","Uma insurreição de indígenas no Pará liderada por pajés","Uma revolta liberal em São Paulo contra o Período Regencial","Uma guerra de independência no Maranhão contra o governo do Rio de Janeiro"],ans:0,exp:"A Balaiada foi uma revolta popular de escravizados, indígenas e camponeses livres no Maranhão (1838–1841), liderada por Manuel Francisco dos Anjos Ferreira ('o Balaio') e Raimundo Gomes. Combatia a opressão dos grandes proprietários apoiados pelo governo imperial."},
  {id:193,type:"mc",cat:"Fauna",diff:"medium",q:"O que é o 'canto da seriema' e qual seu papel no Cerrado?",opts:["Um grito de alerta para predadores, que serve de alarme para outros animais do Cerrado","Uma chamada de acasalamento que só ocorre à noite","O som que a seriema usa para atrair presas","Um canto territorial emitido apenas durante a seca"],ans:0,exp:"O grito da seriema, audível a vários quilômetros, funciona como alarme para toda a comunidade animal do Cerrado. Outros animais reconhecem seu chamado de alerta e reagem fugiram de predadores — tornando-a um sentinel natural do bioma."},
  {id:194,type:"mc",cat:"Natureza",diff:"hard",q:"Qual é a principal ameaça ao Cerrado atualmente?",opts:["Mineração ilegal de ouro","Expansão da agropecuária, principalmente soja e pecuária bovina","Urbanização acelerada das cidades do Centro-Oeste","Queimadas causadas por indígenas durante rituais tradicionais"],ans:1,exp:"A principal ameaça ao Cerrado é a expansão da fronteira agropecuária — especialmente a soja e a pecuária bovina do MATOPIBA (Maranhão, Tocantins, Piauí e Bahia). O Cerrado perdeu mais de 50% de sua cobertura original e não tem as mesmas proteções legais da Amazônia."},
  {id:195,type:"mc",cat:"Cultura",diff:"medium",q:"Qual é o maior evento de literatura do Brasil?",opts:["Feira do Livro de Porto Alegre","FLIP — Festa Literária Internacional de Paraty","Bienal do Livro de São Paulo","Salão do Livro de Recife"],ans:2,exp:"A Bienal do Livro de São Paulo é o maior evento literário do Brasil e um dos maiores do mundo, realizado bienalmente com mais de 700.000 visitantes por edição. A FLIP de Paraty é a mais prestigiada internacionalmente, mas a Bienal é a maior em público."},
  {id:196,type:"mc",cat:"Ciência",diff:"medium",q:"O que é o Projeto Genoma Humano no Brasil?",opts:["Uma iniciativa brasileira para sequenciar o genoma de populações amazônicas","O Brasil participou do Projeto Genoma Humano internacional e foi o único país em desenvolvimento a contribuir com sequenciamento","Um programa da FAPESP para mapear o genoma da cana-de-açúcar","Uma pesquisa do INPA sobre o DNA das árvores da Amazônia"],ans:1,exp:"O Brasil foi o único país em desenvolvimento a participar do Consórcio Internacional do Genoma Humano, sequenciando o cromossomo 22. A FAPESP coordenou a participação brasileira com pesquisadores da USP, UNICAMP e outras instituições."},
  {id:197,type:"mc",cat:"Natureza",diff:"easy",q:"Qual é o principal afluente do Rio Amazonas pelo lado sul?",opts:["Rio Negro","Rio Tapajós","Rio Madeira","Rio Xingu"],ans:2,exp:"O Rio Madeira é o principal afluente do Amazonas pelo lado sul — e o maior afluente em volume de água. Nasce na Bolívia e Perú e percorre 3.250 km até encontrar o Amazonas próximo a Itacoatiara (AM)."},
  {id:198,type:"mc",cat:"História",diff:"hard",q:"Quem foi Cândido Rondon e qual sua principal contribuição?",opts:["General que reprimiu a Revolta da Chibata em 1910","Militar e explorador que integrou os territórios do Centro-Oeste e fundou o SPI, precursor da FUNAI","Engenheiro responsável pela construção da ferrovia Madeira-Mamoré","Almirante que modernizou a Marinha brasileira no início do século XX"],ans:1,exp:"Marechal Cândido Rondon (1865–1958) foi pioneiro na integração do Centro-Oeste e Amazônia, construindo linhas telegráficas por territórios inexplorados. Fundou o SPI (Serviço de Proteção ao Índio) em 1910, com a filosofia 'morrer se preciso for, matar nunca'. O estado de Rondônia tem seu nome."},
  {id:199,type:"mc",cat:"Economia",diff:"easy",q:"O que significa a sigla BRICS?",opts:["Brasil, Rússia, Índia, China e África do Sul — bloco de economias emergentes","Brasil, Romênia, Irlanda, Colômbia e Suécia — países exportadores de commodities","Brasil, Rússia, Israel, Chile e Suíça — parceiros comerciais do G7","Bloco de países da América Latina liderado pelo Brasil"],ans:0,exp:"BRICS é a sigla para Brasil, Rússia, Índia, China e África do Sul — as maiores economias emergentes do mundo. O grupo, criado em 2009, busca reformar a governança global e representa cerca de 40% da população mundial e 25% do PIB global."},
  {id:200,type:"mc",cat:"Identidade",diff:"medium",q:"Por que o Brasil é chamado de 'País do Futuro' — e quem criou essa expressão?",opts:["O presidente Getúlio Vargas, em discurso sobre industrialização nos anos 1940","O escritor austríaco Stefan Zweig, no livro 'Brasil, País do Futuro' (1941), celebrando a diversidade e potencial brasileiro","O economista americano que criou o termo BRICS ao descrever o crescimento brasileiro","O poeta Carlos Drummond de Andrade, em crônica sobre o desenvolvimentismo de JK"],ans:1,exp:"A expressão 'Brasil, País do Futuro' é título do livro de Stefan Zweig publicado em 1941, quando o escritor austríaco exilado se encantou com a harmonia racial e o potencial do Brasil. A expressão tornou-se parte da identidade nacional — às vezes usada com ironia sobre promessas não cumpridas."},
  {id:201,type:"mc",cat:"SUS",diff:"easy",q:"O que significa a sigla SUS?",opts:["Sistema Único de Saúde","Serviço Universal de Saúde","Sistema Unificado de Seguridade","Serviço Único de Seguridade"],ans:0,exp:"O SUS — Sistema Único de Saúde — foi criado pela Constituição de 1988 e regulamentado pela Lei 8.080/1990. É o maior sistema de saúde pública universal do mundo em população atendida: mais de 210 milhões de brasileiros."},
  {id:202,type:"tf",cat:"SUS",diff:"easy",q:"O SUS oferece transplantes de órgãos gratuitamente à população.",ans:true,exp:"Correto. O Brasil tem o maior programa público de transplantes do mundo. Em 2023 foram realizados mais de 22.000 transplantes pelo SUS — rim, fígado, coração, pulmão e medula — todos gratuitos ao paciente."},
  {id:203,type:"mc",cat:"SUS",diff:"medium",q:"Qual programa do SUS é responsável pela saúde das famílias nas comunidades?",opts:["Programa Mais Médicos","Estratégia Saúde da Família (ESF)","UPA 24h","Programa Nacional de Imunizações"],ans:1,exp:"A Estratégia Saúde da Família (ESF), criada em 1994, é o principal modelo de atenção básica do SUS. Equipes de médico, enfermeiro e agentes comunitários acompanham famílias em seus territórios, com cobertura de mais de 60% da população brasileira."},
  {id:204,type:"tf",cat:"SUS",diff:"medium",q:"O Programa Nacional de Imunizações (PNI) é considerado um dos melhores do mundo.",ans:true,exp:"Correto. O PNI brasileiro, criado em 1973, é referência mundial. O Brasil oferece gratuitamente mais de 45 tipos de vacinas — uma das maiores coberturas vacinais do planeta. Erradicou a poliomielite em 1989 e o sarampo nativo em 2016."},
  {id:205,type:"mc",cat:"SUS",diff:"hard",q:"O que é o SAMU e qual seu número de telefone?",opts:["Serviço de Assistência Médica Urgente, fone 192","Serviço de Atendimento Médico de Urgência, fone 190","Sistema Avançado de Medicina de Urgência, fone 193","Serviço de Ambulância Municipal de Urgência, fone 191"],ans:0,exp:"O SAMU (Serviço de Atendimento Móvel de Urgência) atende pelo número 192 e foi criado em 2003. Regula e coordena o atendimento pré-hospitalar em todo o Brasil, com médicos e enfermeiros nas centrais de regulação decidindo o melhor recurso para cada chamado."},
  {id:206,type:"tf",cat:"SUS",diff:"hard",q:"O Brasil produz mais de 90% das vacinas que aplica pelo SUS com tecnologia nacional.",ans:false,exp:"Parcialmente correto, mas a afirmação é exagerada. O Brasil tem forte produção nacional (Butantan, Fiocruz/Bio-Manguinhos, Tecpar), mas ainda importa insumos e algumas vacinas completas. O país produz ~70–80% em volume, com estratégia de transferência de tecnologia para ampliar a autossuficiência."},
  {id:207,type:"mc",cat:"SUS",diff:"medium",q:"O que é a Fiocruz?",opts:["Fundação Oswaldo Cruz, maior instituto de ciência e saúde da América Latina","Fundo Interno de Organização do SUS","Frente Integrada de Operações e Urgência do SUS em Zona Rural","Fundação de Inovação e Organização do Complexo de Saúde"],ans:0,exp:"A Fiocruz (Fundação Oswaldo Cruz), fundada em 1900 no Rio de Janeiro, é a maior instituição de ciência e tecnologia em saúde da América Latina. Produz vacinas (incluindo febre amarela e Covid), pesquisa doenças tropicais e forma profissionais de saúde pública."},
  {id:208,type:"tf",cat:"SUS",diff:"medium",q:"O SUS é financiado apenas pelo governo federal.",ans:false,exp:"Errado. O SUS é financiado pelos três entes federativos: União, estados e municípios, em modelo tripartite. A Constituição define percentuais mínimos de aplicação em saúde (15% da receita líquida dos municípios e 12% dos estados). O financiamento compartilhado é central ao modelo."},
  {id:209,type:"mc",cat:"SUS",diff:"hard",q:"Qual lei regulamentou o SUS definindo seus princípios de universalidade, integralidade e equidade?",opts:["Lei 8.080/1990","Lei 8.142/1990","Lei 9.394/1996","Decreto 7.508/2011"],ans:0,exp:"A Lei 8.080/1990 (Lei Orgânica da Saúde) regulamentou o SUS, definindo seus princípios doutrinários: universalidade (todos têm direito), integralidade (atenção completa) e equidade (tratar desigualdades). A Lei 8.142/1990 complementou com a participação social e financiamento."},
  {id:210,type:"tf",cat:"SUS",diff:"easy",q:"O SUS atende também estrangeiros que estejam no Brasil.",ans:true,exp:"Correto. O princípio da universalidade do SUS garante atendimento a qualquer pessoa em território nacional, independentemente de nacionalidade, documentação ou condição socioeconômica. Turistas, imigrantes e refugiados têm direito ao atendimento."},
  {id:211,type:"mc",cat:"Educação",diff:"easy",q:"Qual é o principal programa de acesso ao ensino superior público no Brasil?",opts:["PROUNI","ENEM","SISU","FIES"],ans:2,exp:"O SISU (Sistema de Seleção Unificada) usa a nota do ENEM para selecionar alunos para vagas em universidades e institutos federais públicos. O PROUNI oferece bolsas em instituições privadas, e o FIES financia o ensino privado. O ENEM é a prova, não o programa de acesso."},
  {id:212,type:"tf",cat:"Educação",diff:"easy",q:"A educação básica no Brasil é obrigatória dos 4 aos 17 anos.",ans:true,exp:"Correto. A Emenda Constitucional 59/2009 ampliou a obrigatoriedade escolar dos 4 aos 17 anos, incluindo a pré-escola (4–5 anos), ensino fundamental (6–14 anos) e ensino médio (15–17 anos). É dever do Estado e da família garantir essa frequência."},
  {id:213,type:"mc",cat:"Educação",diff:"medium",q:"O que é o ENEM?",opts:["Exame Nacional de Ensino Médio, que avalia alunos ao fim do ensino médio e abre portas para o ensino superior","Exame Nacional de Educação Municipal, aplicado pelas prefeituras","Exame Nacional de Ensino e Mérito, que substitui o vestibular em todas as universidades","Avaliação nacional de professores do ensino médio"],ans:0,exp:"O ENEM (Exame Nacional do Ensino Médio), criado em 1998, avalia alunos concluintes do ensino médio em quatro áreas do conhecimento mais redação. Sua nota é usada no SISU, PROUNI, FIES e por universidades portuguesas para aceitar brasileiros."},
  {id:214,type:"tf",cat:"Educação",diff:"medium",q:"O Brasil tem mais de 300 universidades federais distribuídas por todo o país.",ans:false,exp:"Errado. O Brasil tem 68 universidades federais (IFES), além de institutos federais de educação (IFs). São mais de 300 campi distribuídos pelo país, o que pode gerar confusão. O número de instituições federais de ensino superior é de cerca de 68 universidades."},
  {id:215,type:"mc",cat:"Educação",diff:"hard",q:"O que é o Fundeb?",opts:["Fundo de Manutenção e Desenvolvimento da Educação Básica, principal mecanismo de financiamento da educação pública","Fundo Nacional para o Desenvolvimento da Educação Básica Empreendedora","Fundação Federal de Bolsas para Estudantes","Fundo de Desenvolvimento do Ensino Básico criado pela USP"],ans:0,exp:"O Fundeb (Fundo de Manutenção e Desenvolvimento da Educação Básica) redistribui recursos entre estados e municípios para financiar a educação básica pública. Aprovado de forma permanente em 2020, garante piso de gastos por aluno e complementação federal onde os recursos são insuficientes."},
  {id:216,type:"tf",cat:"Educação",diff:"easy",q:"A USP é a universidade brasileira melhor ranqueada no mundo.",ans:true,exp:"Correto. A Universidade de São Paulo (USP) é consistentemente a melhor universidade da América Latina e a brasileira mais bem colocada nos rankings internacionais (QS, THE, ARWU). Está entre as 100–200 melhores do mundo dependendo do ranking."},
  {id:217,type:"mc",cat:"Educação",diff:"medium",q:"O que é a CAPES?",opts:["Coordenação de Aperfeiçoamento de Pessoal de Nível Superior, que avalia e fomenta a pós-graduação no Brasil","Câmara de Aprovação de Professores do Ensino Superior","Centro de Avaliação do Plano de Ensino Superior","Comissão de Acesso à Pós-graduação em Escolas Superiores"],ans:0,exp:"A CAPES (Coordenação de Aperfeiçoamento de Pessoal de Nível Superior) avalia os programas de pós-graduação brasileiros e concede bolsas de mestrado, doutorado e pós-doutorado — no Brasil e no exterior. É o principal órgão regulador da pós-graduação nacional."},
  {id:218,type:"tf",cat:"Educação",diff:"medium",q:"O Brasil tem o maior número de analfabetos da América do Sul.",ans:false,exp:"Errado. Embora o Brasil ainda tenha desafios de alfabetização (~7% da população adulta, ~11 milhões de pessoas), não é o país com maior taxa de analfabetismo da América do Sul. Países como Bolívia e Paraguai historicamente tiveram taxas maiores. O Brasil, porém, tem o maior número absoluto pelo tamanho da população."},
  {id:219,type:"mc",cat:"Educação",diff:"easy",q:"Qual é a principal avaliação da educação básica no Brasil?",opts:["ENEM","SAEB","PISA","Prova Brasil"],ans:1,exp:"O SAEB (Sistema de Avaliação da Educação Básica) é o principal sistema de avaliação da educação básica pública no Brasil, incluindo a Prova Brasil e o ANEB. Avalia português e matemática nos anos finais do ensino fundamental e médio, gerando o IDEB (Índice de Desenvolvimento da Educação Básica)."},
  {id:220,type:"tf",cat:"Educação",diff:"hard",q:"O Brasil foi pioneiro na educação de jovens e adultos com o Método Paulo Freire, adotado em mais de 40 países.",ans:true,exp:"Correto. Paulo Freire (1921–1997), patrono da educação brasileira, criou um método revolucionário de alfabetização de adultos que usa palavras do cotidiano do educando. Seu livro 'Pedagogia do Oprimido' é o terceiro mais citado em ciências humanas no mundo e seu método é aplicado em mais de 40 países."},
  {id:221,type:"mc",cat:"Segurança",diff:"medium",q:"Qual é o órgão federal responsável pela segurança pública nas rodovias federais?",opts:["Polícia Federal","Polícia Rodoviária Federal","Polícia Civil Federal","ANTT — Agência Nacional de Transportes Terrestres"],ans:1,exp:"A Polícia Rodoviária Federal (PRF) é responsável pelo patrulhamento das rodovias federais — mais de 75.000 km de estradas. Além do policiamento, atua na prevenção de acidentes, fiscalização de cargas e combate ao crime organizado nas rodovias."},
  {id:222,type:"tf",cat:"Segurança",diff:"easy",q:"A Polícia Militar no Brasil é subordinada ao governo estadual, não ao federal.",ans:true,exp:"Correto. As Polícias Militares são forças estaduais, subordinadas aos governadores de cada estado. A Constituição de 1988 as define como forças auxiliares e reserva do Exército. Cada estado tem sua própria PM, com comando e gestão independentes."},
  {id:223,type:"mc",cat:"Segurança",diff:"hard",q:"O que é o SISP?",opts:["Sistema Integrado de Segurança Pública, que reúne todas as polícias federais e estaduais","Secretaria de Inteligência e Segurança Pública do Ministério da Justiça","Sistema Nacional de Informações de Segurança Pública, Prisionais e sobre Drogas — base de dados criminal nacional","Secretaria de Investigação e Segurança dos Portos"],ans:2,exp:"O SINESP (Sistema Nacional de Informações de Segurança Pública, Prisionais e sobre Drogas), criado pela Lei 12.681/2012, é a base de dados unificada do sistema de segurança pública brasileiro, integrando informações de todas as unidades federativas sobre ocorrências, presos e estatísticas criminais."},
  {id:224,type:"tf",cat:"Segurança",diff:"medium",q:"O Brasil tem o maior número absoluto de presos do mundo.",ans:false,exp:"Errado. Os EUA têm a maior população carcerária do mundo em números absolutos (~2 milhões). O Brasil ocupa o 3º lugar, com cerca de 830.000 presos. Em taxa por 100.000 habitantes, os EUA também lideram."},
  {id:225,type:"mc",cat:"Segurança",diff:"medium",q:"O que é o PRONASCI?",opts:["Programa Nacional de Segurança Pública com Cidadania, que integra segurança e políticas sociais","Programa Nacional de Armas de Segurança Cidadã","Projeto Nacional de Apoio às Secretarias de Segurança com Integração","Protocolo Nacional de Segurança e Cidadania nas Cidades"],ans:0,exp:"O PRONASCI (Programa Nacional de Segurança Pública com Cidadania), criado em 2007, inovou ao integrar ações de segurança com políticas sociais — educação, habitação, saúde — para comunidades vulneráveis. Reconhecido internacionalmente como modelo de segurança cidadã."},
  {id:226,type:"tf",cat:"Segurança",diff:"hard",q:"A Polícia Federal brasileira é responsável pela investigação de crimes contra o patrimônio da União e crimes internacionais.",ans:true,exp:"Correto. A Polícia Federal (PF) tem atribuição constitucional para investigar infrações penais contra a União, crimes internacionais, tráfico de drogas e pessoas, crimes financeiros transnacionais, e exerce com exclusividade as funções de polícia judiciária da União."},
  {id:227,type:"mc",cat:"Segurança",diff:"easy",q:"Qual é o número de emergência da Polícia Militar em todo o Brasil?",opts:["190","192","193","199"],ans:0,exp:"O número 190 é o de emergência da Polícia Militar em todo o Brasil. O 192 é o SAMU, o 193 é o Corpo de Bombeiros e o 197 é a Polícia Civil. O sistema de emergência integrado varia por estado, mas o 190 é universalmente conhecido como 'polícia'."},
  {id:228,type:"tf",cat:"Segurança",diff:"medium",q:"O Estatuto do Desarmamento, aprovado em 2003, reduziu o número de homicídios por arma de fogo no Brasil.",ans:true,exp:"Correto. Estudos mostram redução de mortes por arma de fogo após o Estatuto do Desarmamento (Lei 10.826/2003) e o referendo de 2005 sobre proibição da venda de armas. Pesquisas do IPEA e do Igarapé estimam que dezenas de milhares de vidas foram poupadas entre 2004 e 2007."},
  {id:229,type:"mc",cat:"Segurança",diff:"hard",q:"O que é a Força Nacional de Segurança Pública?",opts:["Um exército paralelo criado para combater o crime organizado nas fronteiras","Uma força policial federal criada em 2004 para reforçar a segurança em estados em crise, com efetivo cedido pelas PMs estaduais","A denominação oficial da Polícia Federal durante operações especiais","Um corpo de elite do Exército para missões de segurança interna"],ans:1,exp:"A Força Nacional de Segurança Pública (FNSP), criada em 2004, é um efetivo de policiais militares cedidos pelos estados e treinados para atuar em reforço a qualquer unidade federativa que solicite apoio federal em situações de crise. Já atuou em grandes eventos como Copa do Mundo e Olimpíadas."},
  {id:230,type:"tf",cat:"Segurança",diff:"easy",q:"O Corpo de Bombeiros no Brasil é parte da Polícia Militar.",ans:true,exp:"Na maioria dos estados brasileiros, o Corpo de Bombeiros é uma corporação autônoma ou vinculada à Polícia Militar. Em alguns estados como Rio de Janeiro e São Paulo, os bombeiros são militares estaduais sob comando próprio, mas historicamente estiveram integrados à PM."},
  {id:231,type:"mc",cat:"Política",diff:"medium",q:"Quantas câmaras compõem o Congresso Nacional brasileiro?",opts:["Uma — a Câmara dos Deputados","Duas — Câmara dos Deputados e Senado Federal","Três — Câmara, Senado e Conselho da República","Duas — Senado Federal e Câmara dos Representantes"],ans:1,exp:"O Congresso Nacional brasileiro é bicameral: Câmara dos Deputados (513 deputados federais, mandato de 4 anos, eleitos proporcionalmente) e Senado Federal (81 senadores, 3 por estado + DF, mandato de 8 anos). Juntos formam o Poder Legislativo federal."},
  {id:232,type:"tf",cat:"Política",diff:"easy",q:"O voto no Brasil é obrigatório para todos os cidadãos maiores de 18 anos.",ans:false,exp:"Parcialmente correto. O voto é obrigatório para brasileiros alfabetizados entre 18 e 70 anos. É facultativo para analfabetos, maiores de 70 anos e jovens entre 16 e 17 anos. Quem não vota precisa justificar ou pagar multa para ter documentos regularizados."},
  {id:233,type:"mc",cat:"Política",diff:"hard",q:"Quantos ministérios tem o governo federal brasileiro (aproximadamente, governo Lula III)?",opts:["17","23","37","45"],ans:2,exp:"O governo Lula III (desde 2023) tem 37 ministérios — o maior número da história recente do Brasil. A fragmentação reflete a necessidade de acomodar a base aliada em um sistema multipartidário com mais de 30 partidos com representação no Congresso."},
  {id:234,type:"tf",cat:"Política",diff:"medium",q:"O presidente do Brasil pode ser reeleito apenas uma vez.",ans:true,exp:"Correto. A Constituição de 1988 permite uma reeleição consecutiva para presidente da República — máximo de dois mandatos seguidos de 4 anos cada. Após um afastamento de um mandato, o ex-presidente pode concorrer novamente."},
  {id:235,type:"mc",cat:"Política",diff:"medium",q:"O que é o STF?",opts:["Superior Tribunal Federal, que julga crimes comuns","Supremo Tribunal Federal, a mais alta corte do Brasil, guarda da Constituição","Sistema de Tribunais Federativos, que reúne todos os tribunais regionais","Secretaria de Tutela Federativa, ligada ao Ministério da Justiça"],ans:1,exp:"O Supremo Tribunal Federal (STF) é a mais alta instância do Judiciário brasileiro e guarda da Constituição. Tem 11 ministros indicados pelo presidente e aprovados pelo Senado, com mandato vitalício até os 75 anos. Julga ações de controle de constitucionalidade e causas de alta relevância."},
  {id:236,type:"tf",cat:"Política",diff:"hard",q:"O Brasil adota o sistema de lista aberta para eleições proporcionais, permitindo que o eleitor vote no candidato, não apenas no partido.",ans:true,exp:"Correto. Nas eleições proporcionais (deputados federais, estaduais, vereadores), o Brasil usa lista aberta: o eleitor pode votar no candidato (voto nominal) ou na legenda (voto de legenda). Os candidatos mais votados dentro do quociente partidário são eleitos — diferente da lista fechada onde o partido define a ordem."},
  {id:237,type:"mc",cat:"Política",diff:"easy",q:"Qual é o papel do Tribunal Superior Eleitoral (TSE)?",opts:["Julgar crimes eleitorais como réu em última instância","Organizar, supervisionar e julgar o processo eleitoral brasileiro","Fiscalizar os gastos de campanha dos partidos políticos","Definir as regras do horário eleitoral gratuito"],ans:1,exp:"O TSE organiza, supervisiona e julga o processo eleitoral brasileiro — desde o cadastro de eleitores e candidatos até a diplomação dos eleitos. É composto por ministros do STF, do STJ e de advogados indicados pelo presidente. Também é responsável pelas urnas eletrônicas."},
  {id:238,type:"tf",cat:"Política",diff:"medium",q:"O Brasil tem um dos maiores sistemas eleitorais do mundo, com mais de 156 milhões de eleitores.",ans:true,exp:"Correto. O Brasil tem mais de 156 milhões de eleitores cadastrados — o quarto maior eleitorado do mundo, atrás apenas da Índia, EUA e Indonésia. Nas eleições de 2022, foram mais de 124 milhões de votos válidos para presidente."},
  {id:239,type:"mc",cat:"Política",diff:"hard",q:"O que é o 'Centrão' na política brasileira?",opts:["Um bloco de partidos de centro-esquerda que apoia o PT","Um grupo informal de partidos sem ideologia definida que negocia apoio ao governo em troca de cargos e recursos","O nome oficial da coalizão de partidos do atual governo","Um movimento político criado nos anos 1990 para combater a corrupção"],ans:1,exp:"O 'Centrão' é o nome dado informalmente ao grupo de partidos sem ideologia definida que costuma apoiar o governo de plantão em troca de cargos ministeriais, verbas e influência. É uma característica do presidencialismo de coalizão brasileiro — o governo precisa montar ampla base para governar."},
  {id:240,type:"tf",cat:"Política",diff:"easy",q:"O Brasil é uma república federativa, o que significa que estados e municípios têm autonomia.",ans:true,exp:"Correto. O Brasil é uma República Federativa Presidencialista composta por 26 estados, o Distrito Federal e 5.568 municípios, todos com autonomia administrativa, financeira e política — poderes executivo, legislativo e, no caso de estados, judiciário próprios."},
  {id:241,type:"mc",cat:"Economia",diff:"medium",q:"Qual é o banco central do Brasil e quem o controla?",opts:["Banco do Brasil, controlado pelo governo federal","Banco Central do Brasil (BACEN), autarquia federal com independência operacional","Caixa Econômica Federal, vinculada ao Ministério da Fazenda","BNDES, banco de desenvolvimento controlado pelo Ministério do Planejamento"],ans:1,exp:"O Banco Central do Brasil (BACEN ou BCB) é a autarquia federal responsável pela política monetária, câmbio e supervisão do sistema financeiro. Desde 2021 tem independência formal (lei aprovada), com diretores com mandatos fixos para isolar a política monetária de pressões políticas."},
  {id:242,type:"tf",cat:"Economia",diff:"medium",q:"O Brasil é a maior economia da América Latina.",ans:true,exp:"Correto. O Brasil tem o maior PIB da América Latina — aproximadamente US$ 2 trilhões, representando cerca de 40% do PIB da região. É também a 9ª ou 10ª maior economia do mundo, dependendo do ano e da metodologia."},
  {id:243,type:"mc",cat:"Economia",diff:"hard",q:"O que é o 'custo Brasil'?",opts:["O valor médio de vida no Brasil comparado a outros países emergentes","O conjunto de fatores que encarecem a produção no Brasil: carga tributária, infraestrutura precária, burocracia e juros altos","O déficit comercial do Brasil com parceiros internacionais","O custo de importação de produtos industrializados para o mercado brasileiro"],ans:1,exp:"'Custo Brasil' é o termo usado para descrever o conjunto de fatores estruturais que encarecem a produção e os negócios no país: uma das maiores cargas tributárias do mundo (~33% do PIB), infraestrutura logística precária, burocracia excessiva, juros elevados e legislação trabalhista complexa."},
  {id:244,type:"tf",cat:"Economia",diff:"easy",q:"O agronegócio representa mais de 25% do PIB brasileiro.",ans:true,exp:"Correto. O agronegócio brasileiro (incluindo insumos, produção, agroindústria e serviços) representa entre 25% e 30% do PIB nacional e mais de 40% das exportações. O Brasil é líder mundial ou top 3 em soja, carne bovina, frango, café, açúcar, suco de laranja e algodão."},
  {id:245,type:"mc",cat:"Economia",diff:"medium",q:"O que é a Caixa Econômica Federal e qual seu papel social?",opts:["Um banco privado com participação do governo focado em grandes empresas","Banco público federal responsável por programas habitacionais, FGTS, loterias e transferência de renda","Banco de desenvolvimento focado em infraestrutura urbana","Instituição financeira que administra os fundos de pensão dos servidores públicos"],ans:1,exp:"A Caixa Econômica Federal, fundada em 1861, é o maior banco público da América Latina. Administra o FGTS, o programa habitacional Minha Casa Minha Vida, as loterias federais e distribui benefícios como Bolsa Família/Bolsa Família, PIS/PASEP e BPC — conectando-se diretamente a milhões de brasileiros de baixa renda."},
  {id:246,type:"tf",cat:"Economia",diff:"hard",q:"O Brasil é o único país do mundo que tem câmaras de comércio em mais de 100 países.",ans:false,exp:"Errado. O Brasil tem uma boa rede de câmaras de comércio e representações comerciais no exterior, mas não é o único — nem tem câmaras em mais de 100 países. EUA, Alemanha, França e Reino Unido têm redes comerciais muito maiores. O Brasil tem aproximadamente 40–50 câmaras de comércio ativas no exterior."},
  {id:247,type:"mc",cat:"Economia",diff:"easy",q:"Qual é o principal parceiro comercial do Brasil atualmente?",opts:["Estados Unidos","Argentina","China","União Europeia"],ans:2,exp:"A China é o principal parceiro comercial do Brasil desde 2009, tanto em exportações quanto em importações. O Brasil exporta principalmente commodities agrícolas e minerais (soja, minério de ferro, petróleo) e importa manufaturados e eletrônicos chineses."},
  {id:248,type:"tf",cat:"Economia",diff:"medium",q:"O Bolsa Família é o maior programa de transferência de renda do mundo.",ans:false,exp:"Errado. O Bolsa Família/Auxílio Brasil é um dos maiores programas de transferência de renda do mundo, mas não o maior. Programas da Índia (como o PM-KISAN) e da China atingem populações muito maiores. O Bolsa Família é, porém, um dos mais estudados e replicados como modelo."},
  {id:249,type:"mc",cat:"Economia",diff:"hard",q:"Qual é a maior empresa do Brasil por receita e faturamento?",opts:["Petrobras","Vale","Itaú Unibanco","JBS"],ans:0,exp:"A Petrobras consistentemente figura como a maior empresa brasileira por receita e valor de mercado. A Vale (mineração) e o Itaú Unibanco (bancário) disputam as posições seguintes. A JBS é a maior empresa de alimentos do mundo — e também uma das maiores do Brasil."},
  {id:250,type:"tf",cat:"Economia",diff:"easy",q:"O Brasil tem a maior reserva de ferro do mundo.",ans:false,exp:"Errado. O Brasil tem uma das maiores reservas de minério de ferro do mundo — especialmente no Quadrilátero Ferrífero (MG) e na Serra dos Carajás (PA) — mas as maiores reservas mundiais estão na Austrália e no Brasil disputam o segundo lugar com a Rússia."},
  {id:251,type:"mc",cat:"Gentílicos",diff:"easy",q:"Como se chama o habitante de São Paulo?",opts:["Paulistano","Paulista","São Paulense","Paulano"],ans:0,exp:"Paulistano é o gentílico de quem nasce ou mora na cidade de São Paulo. Paulista é o gentílico do estado de São Paulo. Portanto, um morador de Campinas é 'paulista', mas não 'paulistano' — esse título é exclusivo da capital."},
  {id:252,type:"mc",cat:"Gentílicos",diff:"medium",q:"Como se chama o habitante de Mato Grosso do Sul?",opts:["Mato-grossense","Sul-mato-grossense","Mato-grosso-sulense","Campograndense"],ans:1,exp:"O gentílico de Mato Grosso do Sul é sul-mato-grossense. Mato-grossense é o gentílico de Mato Grosso (o estado do norte). Quando o estado foi dividido em 1977, foi necessário criar um novo gentílico para diferenciar os dois."},
  {id:253,type:"mc",cat:"Gentílicos",diff:"hard",q:"Como se chama o habitante de Fortaleza?",opts:["Fortalezense","Fortalezeiro","Cearense","Fortalezano"],ans:0,exp:"O habitante de Fortaleza é chamado de fortalezense. Cearense é o gentílico do estado do Ceará. Curiosidade: Fortaleza é a capital mais populosa do Nordeste e a 5ª maior cidade do Brasil."},
  {id:254,type:"mc",cat:"Gentílicos",diff:"medium",q:"Como se chama o habitante do Espírito Santo?",opts:["Espiritossantense","Capixaba","Espírito-santense","Vitoriense"],ans:1,exp:"O habitante do Espírito Santo é chamado de capixaba — um dos gentílicos mais curiosos do Brasil. A palavra vem do tupi 'kapi'xawa', que significa 'roça de milho'. Vitoriense é o gentílico específico da capital Vitória."},
  {id:255,type:"mc",cat:"Gentílicos",diff:"hard",q:"Como se chama o habitante do Acre?",opts:["Acriano","Acrense","Acreano","Acrita"],ans:2,exp:"O habitante do Acre é chamado de acreano. O estado foi o 27° a ingressar na federação brasileira, comprado da Bolívia pelo Tratado de Petrópolis em 1903, após a Revolução Acreana liderada por Plácido de Castro."},
  {id:256,type:"mc",cat:"Gentílicos",diff:"medium",q:"Como se chama o habitante de Belém (PA)?",opts:["Belenense","Belemita","Paraense","Belemano"],ans:0,exp:"O habitante de Belém é belenense. Paraense é o gentílico do estado do Pará. Belém, fundada em 1616, é a maior metrópole da Amazônia — e fica mais próxima de Miami do que de Porto Alegre."},
  {id:257,type:"mc",cat:"Gentílicos",diff:"hard",q:"Como se chama o habitante de Cuiabá?",opts:["Cuiabano","Cuiabense","Mato-grossense","Cuiabeiro"],ans:0,exp:"O habitante de Cuiabá é cuiabano. Cuiabá é uma das cidades mais quentes do Brasil, com temperaturas que frequentemente ultrapassam 40°C, e é uma das capitais mais interioranas do país."},
  {id:258,type:"mc",cat:"Gentílicos",diff:"easy",q:"Como se chama o habitante do Rio Grande do Sul?",opts:["Rio-grandense","Riograndense","Gaúcho","Sul-riograndense"],ans:2,exp:"O habitante do Rio Grande do Sul é chamado de gaúcho — gentílico que virou sinônimo de identidade cultural forte, associado ao churrasco, chimarrão e Semana Farroupilha. Gaúcho também é usado em outros países da América do Sul para nomear o habitante dos pampas."},
  {id:259,type:"mc",cat:"Gentílicos",diff:"medium",q:"Como se chama o habitante de Manaus?",opts:["Manauense","Manauara","Amazonense","Manaueiro"],ans:1,exp:"O habitante de Manaus é manauara. Amazonense é o gentílico do estado do Amazonas. Manaus é a maior cidade da Amazônia, com 2,2 milhões de habitantes, e está a 1.500 km de qualquer outra grande cidade — praticamente isolada no meio da floresta."},
  {id:260,type:"mc",cat:"Gentílicos",diff:"hard",q:"Como se chama o habitante de Goiânia?",opts:["Goianiense","Goianense","Goiano","Goianiano"],ans:0,exp:"O habitante de Goiânia é goianiense. Goiano é o gentílico do estado de Goiás. Goiânia, fundada em 1933 para ser a nova capital do estado, é a segunda maior cidade do Centro-Oeste e conhecida pelos seus espetos de carne e hospitalidade."},
  {id:261,type:"tf",cat:"Gentílicos",diff:"medium",q:"O gentílico do habitante do Pará é 'paraense', mas o habitante de Belém é 'belenense'.",ans:true,exp:"Correto. Essa distinção entre gentílico do estado e da capital é comum no Brasil. Paraense é quem nasce no Pará, belenense é quem nasce na capital Belém. O mesmo vale para paulista (estado)/paulistano (cidade), carioca (cidade)/fluminense (estado), entre outros."},
  {id:262,type:"mc",cat:"Gentílicos",diff:"medium",q:"Como se chama o habitante do Rio de Janeiro (cidade)?",opts:["Fluminense","Rio-janeirense","Carioca","Riograndense"],ans:2,exp:"O habitante da cidade do Rio de Janeiro é carioca — palavra de origem tupi que significa 'casa do homem branco'. Fluminense é o gentílico do estado do Rio de Janeiro. O Rio é a única capital brasileira cujo gentílico (carioca) não tem relação com o nome da cidade."},
  {id:263,type:"mc",cat:"SóNoBrasil",diff:"hard",q:"O que é o pequi e por que é único no mundo?",opts:["Um fruto do Cerrado com polpa amarela e caroço espinhoso por dentro, insubstituível na culinária goiana e mineira","Uma palmeira da Amazônia cujo cacho serve como instrumento musical indígena","Um peixe de água doce exclusivo do Pantanal que brilha no escuro","Uma formiga da caatinga usada como tempero no nordeste do Brasil"],ans:0,exp:"O pequi (Caryocar brasiliense) é um fruto exclusivo do Cerrado, símbolo da identidade cultural de Goiás e Minas Gerais. Seu caroço tem espinhos microscópicos internos que podem cravar na língua se mordido incorretamente. Aromático e saboroso, é base do arroz com pequi e da galinha caipira — impossível de substituir."},
  {id:264,type:"mc",cat:"SóNoBrasil",diff:"hard",q:"O que é o guaraná e qual sua origem?",opts:["Uma bebida fermentada indígena feita de mandioca, exclusiva da tribo Sateré-Mawé no Amazonas","Uma planta (Paullinia cupana) cultivada originalmente pelos Sateré-Mawé no Amazonas, com mais cafeína que o café, base da maior bebida energética do mundo","Um tipo de chá de ervas medicinais do Sul do Brasil consumido como o chimarrão","Uma fruta do Cerrado com propriedades anti-inflamatórias usada na medicina tradicional"],ans:1,exp:"O guaraná (Paullinia cupana) é originário do Amazonas e foi cultivado pelos Sateré-Mawé há séculos. Tem mais cafeína que o café por grama de semente. O Brasil é o único grande produtor mundial — 98% da produção global vem do Amazonas e Bahia. O refrigerante de guaraná é a bebida mais consumida no Brasil depois da água."},
  {id:265,type:"mc",cat:"SóNoBrasil",diff:"medium",q:"O que é a tapioca e qual sua origem?",opts:["Uma massa feita da fécula de mandioca, originária do Nordeste brasileiro e consumida pelos indígenas Tupinambá antes da colonização","Uma bebida fermentada de milho dos povos do Cerrado","Um bolo de amendoim inventado no Maranhão no século XVIII","Uma massa de arroz introduzida pelos imigrantes japoneses no Nordeste"],ans:0,exp:"A tapioca é feita da fécula (goma) da mandioca — planta originária do Brasil. Era consumida pelos indígenas Tupinambá antes de 1500. Hoje é ícone da gastronomia nordestina e símbolo da culinária brasileira internacionalmente. A mandioca em si é uma contribuição brasileira ao mundo — cultivada em mais de 100 países."},
  {id:266,type:"mc",cat:"SóNoBrasil",diff:"hard",q:"O que é o 'jeitinho brasileiro' e qual sua origem sociológica?",opts:["Um ritmo musical criado na periferia de São Paulo nos anos 1980","Uma estratégia informal de resolver problemas burlando regras ou usando relações pessoais, estudada por Roberto DaMatta como traço cultural brasileiro","Um tipo de artesanato do Nordeste que usa materiais reciclados de forma criativa","Um estilo de dança improvisada derivada do samba"],ans:1,exp:"O 'jeitinho brasileiro' foi descrito pelo antropólogo Roberto DaMatta como uma estratégia relacional de resolver problemas quando as regras formais bloqueiam o caminho — usando criatividade, apelos pessoais ou flexibilização das normas. É um traço cultural estudado academicamente, com aspectos positivos (criatividade, adaptabilidade) e negativos (favorecimento, corrupção)."},
  {id:267,type:"mc",cat:"SóNoBrasil",diff:"medium",q:"O que é o açaí e por que virou fenômeno global a partir do Brasil?",opts:["Uma palmeira nativa da Amazônia cujo fruto é consumido há séculos pelos ribeirinhos, hoje exportado como superalimento para mais de 50 países","Uma fruta do Cerrado usada para fazer refrigerante, introduzida no mercado internacional pelos anos 1990","Um derivado da mandioca consumido pelos indígenas do Alto Xingu e popularizado pelo surfista Carlos Burle","Uma semente amazônica usada como corante natural, exportada para a indústria cosmética europeia"],ans:0,exp:"O açaí (Euterpe oleracea) é da palmeira juçara, nativa da Amazônia. Consumido há séculos pelos povos ribeirinhos como alimento energético, virou febre nos anos 1990 nos mercados de surf do Rio e São Paulo, e hoje é exportado para mais de 50 países como superalimento. O Brasil é responsável por quase 100% da produção mundial."},
  {id:268,type:"mc",cat:"SóNoBrasil",diff:"hard",q:"O que é o 'bumba-meu-boi' do Maranhão, incluindo um elemento que só existe nesse folguedo?",opts:["O boi de pano — um animal fantástico confeccionado com bordados únicos que representa cada brincante, identificando seu grupo e origem","Os tambores de couro de capivara tocados apenas durante a festa","As máscaras de argila pintada com pigmentos naturais amazônicos","Os foguetes artesanais lançados durante a procissão de abertura"],ans:0,exp:"O 'sotaque' — a identidade sonora e visual de cada grupo de Bumba-meu-boi — é único no mundo. Cada grupo tem seu boi, um animal confeccionado artesanalmente com bordados riquíssimos que identifica a comunidade. Os sotaques (Costa de Mão, Matraca, Zabumba, Orquestra) criam universos distintos de música, dança e indumentária que não existem em nenhum outro folguedo do planeta."},
  {id:269,type:"mc",cat:"SóNoBrasil",diff:"hard",q:"O que é a 'seresta' e por que é única no Brasil?",opts:["Um tipo de show de forró eletrônico do interior do Nordeste","Uma tradição musical noturna de serenata com instrumentos de sopro e cordas, originária das cidades históricas de Minas Gerais, distinta da serenata europeia","Um gênero de samba cantado exclusivamente por mulheres no Rio de Janeiro","Um festival anual de música instrumental realizado em Ouro Preto desde 1930"],ans:1,exp:"A seresta é uma tradição musical noturna tipicamente brasileira — diferente da serenata europeia — que usa flauta, violão e clarinete para cantar nas ruas, especialmente em cidades históricas como Paraty e Ouro Preto. Tem um repertório próprio de modinhas e lunduns do século XIX, criando uma atmosfera única e inconfundível."},
  {id:270,type:"mc",cat:"SóNoBrasil",diff:"medium",q:"O que é o tucupi e por que é único na culinária mundial?",opts:["Um molho venenoso extraído da mandioca brava, cozido por horas até neutralizar o ácido cianídrico, base de pratos como o pato no tucupi — único no mundo por esse processo","Um caldo de ossos de peixe amazônico usado como base de sopas ribeirinhas","Um fermentado indígena de pupunha usado como bebida ritual nos rituais Tukano","Um tempero de pimenta defumada exclusivo da culinária marajoara"],ans:0,exp:"O tucupi é um líquido amarelo extraído da mandioca brava — que é naturalmente tóxica. O processo indígena de prensagem, decantação e fervura longa neutraliza o ácido cianídrico, criando um caldo azedo e aromático único. O Pato no Tucupi e o Tacacá (com jambu que entorpece a boca) são iguarias exclusivamente amazônicas sem equivalente no mundo."},
  {id:271,type:"mc",cat:"SóNoBrasil",diff:"easy",q:"O que é o chimarrão e qual sua importância cultural?",opts:["Um prato de carnes típico do RS feito com erva-mate moída e carne seca","Uma bebida quente feita de erva-mate, consumida em cuia com bomba, símbolo da cultura gaúcha e de povos do Cone Sul","Um tipo de cachaça artesanal feita de sorgo no interior do RS","Um ritual de bênção das plantações feito pelos índios Guarani no Sul do Brasil"],ans:1,exp:"O chimarrão é uma bebida feita de erva-mate (Ilex paraguariensis), servida quente em cuia com bomba (canudo com filtro). É o símbolo máximo da cultura gaúcha — compartilhar o chimarrão é um ato de amizade e acolhimento. A erva-mate é originária da região do Prata e seu uso ritual remonta aos povos Guarani há séculos."},
  {id:272,type:"mc",cat:"SóNoBrasil",diff:"hard",q:"O que é o 'jambu' e qual seu efeito único?",opts:["Uma planta amazônica (Acmella oleracea) que provoca formigamento e dormência na boca ao ser mastigada, usada no tacacá e na pirarucu de casaca","Um cogumelo do Cerrado que muda de cor conforme a temperatura ambiente","Uma raiz medicinal da Caatinga usada para tratar picadas de cobra","Um fruto do Pantanal que causa sonolência quando consumido em grandes quantidades"],ans:0,exp:"O jambu (Acmella oleracea) é uma planta amazônica que contém espilantol — uma substância que causa formigamento, salivação intensa e dormência na boca. É ingrediente insubstituível do tacacá e de outros pratos paraenses. Não existe outro ingrediente com esse efeito na culinária mundial — a experiência de comer jambu é verdadeiramente única."},
  {id:273,type:"tf",cat:"SóNoBrasil",diff:"medium",q:"A Capoeira é a única arte marcial do mundo que usa música como parte essencial do combate.",ans:true,exp:"Correto. A capoeira é única no mundo por integrar luta, dança, acrobacia e música em um único sistema. O berimbau dita o ritmo e a intensidade do jogo — sem a música, não há capoeira. Nenhuma outra arte marcial do planeta tem a música como elemento estrutural e inseparável do combate."},
  {id:274,type:"mc",cat:"SUS",diff:"hard",q:"Quantas consultas médicas o SUS realiza por ano aproximadamente?",opts:["50 milhões","150 milhões","500 milhões","1 bilhão"],ans:2,exp:"O SUS realiza aproximadamente 500 milhões de consultas médicas por ano, além de bilhões de procedimentos ambulatoriais, mais de 12 milhões de internações hospitalares e cerca de 3 bilhões de doses de medicamentos distribuídas. É a maior operação de saúde pública do planeta."},
  {id:275,type:"mc",cat:"Educação",diff:"hard",q:"Quantas universidades públicas (federais, estaduais e municipais) existem no Brasil?",opts:["Cerca de 68","Cerca de 130","Cerca de 300","Mais de 1.000"],ans:2,exp:"O Brasil tem cerca de 300 universidades públicas somando federais (68), estaduais (~130) e municipais (~100), além de mais de 650 Institutos Federais e centros tecnológicos. É um dos maiores sistemas públicos de ensino superior do mundo em número de instituições."},
  {id:276,type:"tf",cat:"Economia",diff:"medium",q:"O Brasil é o maior produtor mundial de soja.",ans:true,exp:"Correto. O Brasil superou os EUA como maior produtor e exportador mundial de soja por volta de 2012–2013. Na safra 2022/23, o Brasil produziu mais de 153 milhões de toneladas — quase 40% da produção mundial, destinadas principalmente à China."},
  {id:277,type:"mc",cat:"Política",diff:"medium",q:"O que é o Tribunal de Contas da União (TCU)?",opts:["O tribunal que julga crimes cometidos por servidores públicos federais","Órgão de controle externo que fiscaliza o uso dos recursos públicos federais pelo Executivo","Um tribunal especial que julga processos de corrupção no serviço público","O órgão responsável por auditar as contas do sistema bancário brasileiro"],ans:1,exp:"O TCU é o órgão de controle externo do Congresso Nacional que fiscaliza a aplicação de recursos públicos federais. Aprecia as contas do presidente da República, julga contas de administradores públicos e aplica sanções por irregularidades. É independente e seus ministros têm mandatos vitalícios até os 70 anos."},
  {id:278,type:"tf",cat:"Segurança",diff:"hard",q:"O Brasil tem o maior número de policiais por habitante do mundo.",ans:false,exp:"Errado. O Brasil tem cerca de 450.000 policiais militares e 120.000 civis, mais PF, PRF e outros — aproximadamente 2,5 a 3 policiais por 1.000 habitantes. Países como Rússia, Itália e vários europeus têm taxas maiores. O problema não é a quantidade, mas a distribuição desigual e as condições de trabalho."},
  {id:279,type:"mc",cat:"Gentílicos",diff:"easy",q:"Como se chama o habitante de Brasília?",opts:["Brasiliense","Brasiliano","Candango","Distritense"],ans:0,exp:"O habitante de Brasília é brasiliense. Candango é um apelido histórico dado aos trabalhadores que construíram Brasília (dos anos 1950), com conotação de pioneiro. O gentílico oficial é brasiliense — mas muitos moradores se orgulham de ser chamados de candangos."},
  {id:280,type:"mc",cat:"SóNoBrasil",diff:"medium",q:"O que é o 'caldo de cana' e qual seu papel na cultura urbana brasileira?",opts:["Um destilado artesanal de cana exclusivo do interior paulista","Um suco fresco extraído da cana-de-açúcar, vendido em bancas nas ruas, parte inseparável da cultura de rua brasileira desde o século XIX","Um licor doce feito de melaço servido em festas juninas","Um tipo de cachaça suave misturada com limão, típica do carnaval baiano"],ans:1,exp:"O caldo de cana — suco fresco extraído na hora por moendas de ferro — é um dos ícones da cultura de rua brasileira. Disponível em praticamente toda cidade do país, misturado com limão ou abacaxi, é uma experiência gastronômica singular. O Brasil, maior produtor de cana do mundo, transformou esse suco simples em símbolo popular inimitável."},
  {id:281,type:"tf",cat:"Educação",diff:"medium",q:"O Brasil tem mais de 8 milhões de estudantes matriculados no ensino superior.",ans:true,exp:"Correto. O Brasil tem mais de 9 milhões de estudantes no ensino superior — um dos maiores sistemas do mundo. Cerca de 75% estão em instituições privadas. A expansão foi acelerada por programas como PROUNI (bolsas), FIES (financiamento) e REUNI (expansão das federais)."},
  {id:282,type:"mc",cat:"Política",diff:"hard",q:"O que é o 'presidencialismo de coalizão' — conceito criado para descrever o Brasil?",opts:["Um sistema em que o presidente governa por medidas provisórias sem precisar do Congresso","Um sistema em que o presidente precisa montar ampla coalizão de partidos no Congresso para governar, distribuindo cargos e recursos","Um regime híbrido entre presidencialismo e parlamentarismo praticado no Brasil desde 1946","Uma forma de governo em que o presidente divide o poder executivo com os governadores"],ans:1,exp:"O 'presidencialismo de coalizão' foi um conceito cunhado pelo cientista político Sérgio Abranches em 1988 para descrever o modelo brasileiro: o presidente tem poderes constitucionais fortes, mas num sistema multipartidário fragmentado, precisa montar coalizões amplas e heterogêneas para ter maioria no Congresso — distribuindo ministérios e recursos."},

  {id:289,type:"mc",cat:"Educação",diff:"medium",q:"O que é o IDEB?",opts:["Índice de Desenvolvimento da Educação Básica, que mede fluxo escolar e aprendizado","Indicador de Desempenho da Educação Básica e Especial","Índice de Distribuição da Educação Básica entre entes federativos","Inventário de Dados de Escolas da Educação Básica"],ans:0,exp:"O IDEB (Índice de Desenvolvimento da Educação Básica), criado em 2007, combina duas dimensões: aprovação escolar (fluxo) e aprendizado em português e matemática (SAEB). É calculado para escolas, municípios, estados e Brasil — com metas progressivas. Tornou-se a principal métrica da qualidade da educação básica pública brasileira."},
  {id:290,type:"tf",cat:"Política",diff:"medium",q:"O mandato de senador no Brasil é de 8 anos.",ans:true,exp:"Correto. O Senado Federal tem 81 senadores (3 por estado + DF), eleitos por voto majoritário com mandato de 8 anos — o dobro dos deputados federais (4 anos). A renovação do Senado é alternada: 1/3 e 2/3 nas eleições alternadas, garantindo continuidade institucional."},
  {id:291,type:"mc",cat:"Economia",diff:"hard",q:"O que é a 'poupança' no Brasil e por que é a aplicação mais popular?",opts:["Um tipo de investimento de renda fixa gerenciado pelo Banco Central com garantia do FGC para valores até R$ 250.000","A caderneta de poupança, isenta de Imposto de Renda para pessoas físicas, com rendimento automático mensalmente — a aplicação mais democrática do país","Um fundo de investimento do BNDES para pessoas de baixa renda","Uma conta especial da Caixa vinculada ao FGTS com rendimento diferenciado"],ans:1,exp:"A caderneta de poupança é a aplicação financeira mais popular do Brasil: isenta de IR para pessoa física, simples de abrir, sem prazo e acessível em qualquer banco. Rende a TR + 0,5% ao mês (ou 70% da Selic quando ela estiver abaixo de 8,5% a.a.). Mais de 170 milhões de contas de poupança existem no Brasil."},
  {id:292,type:"tf",cat:"SóNoBrasil",diff:"easy",q:"O Brasil é o único país do mundo onde o Carnaval é feriado nacional.",ans:false,exp:"Errado. O Carnaval não é feriado nacional oficial no Brasil — é ponto facultativo em nível federal, embora muitos estados e municípios o decretem como feriado local. Na prática, o país para, mas tecnicamente não é feriado nacional. Países como Trinidad e Tobago, Bolívia e outros também têm carnaval com status oficial de feriado."},
  {id:293,type:"mc",cat:"Educação",diff:"easy",q:"Qual é o maior programa de bolsas para estudantes de baixa renda no ensino superior privado?",opts:["FIES","PROUNI","SISU","Mais Educação"],ans:1,exp:"O ProUni (Programa Universidade para Todos), criado em 2004, oferece bolsas de estudos integrais e parciais em instituições privadas para estudantes de baixa renda que cursaram o ensino médio em escola pública. Já beneficiou mais de 3 milhões de estudantes — democratizando o acesso ao ensino superior."},
  {id:294,type:"mc",cat:"Segurança",diff:"hard",q:"O que é o Programa de Proteção a Vítimas e Testemunhas Ameaçadas?",opts:["PROVITA — programa que protege testemunhas de crimes graves, transferindo-as para locais seguros com nova identidade","PRONATEC — programa de formação de agentes de proteção","PROTEGE — sistema de câmeras em locais de risco com acionamento emergencial","PROVEST — programa de proteção específico para vítimas de violência doméstica"],ans:0,exp:"O PROVITA (Programa de Proteção a Vítimas e Testemunhas Ameaçadas), regulamentado pela Lei 9.807/1999, protege testemunhas e vítimas em risco de morte por colaborarem com a justiça. Inclui mudança de endereço, identidade protegida, suporte psicossocial e bolsa auxílio. É modelo para vários países."},
  {id:295,type:"tf",cat:"Economia",diff:"hard",q:"O Brasil tem a maior reserva de nióbio do mundo — um mineral estratégico para a indústria aeroespacial.",ans:true,exp:"Correto. O Brasil tem entre 85% e 90% das reservas mundiais de nióbio — mineral essencial para fabricação de aços especiais usados na indústria aeroespacial, automobilística e de construção civil. A maior mina do mundo fica em Araxá (MG), operada pela CBMM."},
  {id:296,type:"mc",cat:"Gentílicos",diff:"medium",q:"Como se chama o habitante de Recife?",opts:["Recifense","Pernambucano","Recifeiro","Recifano"],ans:0,exp:"O habitante de Recife é recifense. Pernambucano é o gentílico do estado. Recife é conhecida como a 'Veneza brasileira' por seus rios e pontes — tem mais pontes que Veneza. É também a capital do Brasil com maior incidência de sol ao longo do ano."},
  {id:297,type:"mc",cat:"SóNoBrasil",diff:"hard",q:"O que é o 'Carnaval de Olinda' e por que seus gigantes de papel-machê são únicos?",opts:["Um carnaval de rua de Pernambuco onde bonecos de até 4 metros desfiam pelas ladeiras históricas, cada um representando personagens da cultura popular — tradição sem equivalente no mundo","Um festival de dança em que fantasias gigantes são usadas em competição entre escolas de mamulengo","Um cortejo de Bumba-meu-boi que usa bonecos articulados de madeira pintada","Um desfile de frevo com fanfarras que percorrem os morros de Olinda no ritmo de quadrilha"],ans:0,exp:"O Carnaval de Olinda tem os 'bonecos gigantes' — figuras de até 4 metros de papel-machê que desfiam pelas ladeiras do centro histórico (Patrimônio da Humanidade) carregadas por brincantes. Cada boneco representa um personagem da cultura popular nordestina. É um carnaval de rua autêntico, sem arquibancadas ou ingresso — único no mundo por unir patrimônio histórico vivo, arte popular e festa democrática."},
  {id:298,type:"mc",cat:"SUS",diff:"medium",q:"O que é a Atenção Básica no SUS e qual seu princípio central?",opts:["O conjunto de procedimentos de alta complexidade como cirurgias e quimioterapia realizados nos hospitais terciários","O primeiro nível de cuidado do SUS, com as UBSs e ESF, que resolve 80% dos problemas de saúde da população próximo de onde as pessoas vivem","O programa de saúde escolar que integra nutrição e vacinação nas escolas públicas","A rede de UPAs que faz atendimento de urgência de média complexidade"],ans:1,exp:"A Atenção Básica é a 'porta de entrada' do SUS — o nível de cuidado mais próximo da população, organizado pelas Unidades Básicas de Saúde (UBS) e equipes da Estratégia Saúde da Família. Resolve cerca de 80% das necessidades de saúde da população e coordena o cuidado para serviços mais especializados quando necessário."},
  {id:299,type:"mc",cat:"Política",diff:"medium",q:"O que é o Conselho Nacional de Saúde (CNS)?",opts:["O órgão que define os salários dos médicos do SUS","Um órgão colegiado de participação social que formula e controla a política nacional de saúde, com metade dos membros sendo usuários do SUS","O conselho de administração do Ministério da Saúde","O comitê científico que aprova novos medicamentos para o SUS"],ans:1,exp:"O Conselho Nacional de Saúde (CNS) é um órgão colegiado do Ministério da Saúde que formula, controla e avalia a política nacional de saúde. Tem composição paritária: 50% usuários do SUS (representantes de movimentos sociais), 25% trabalhadores de saúde e 25% gestores e prestadores. É um modelo de democracia participativa na saúde."},
  {id:300,type:"tf",cat:"SóNoBrasil",diff:"hard",q:"O Brasil é o único país do mundo onde existe uma cultura de 'saudade' tão elaborada que a palavra não tem tradução exata em nenhuma língua.",ans:true,exp:"Correto. 'Saudade' — a melancolia doce pela ausência de algo ou alguém amado, com a esperança de reencontro — não tem tradução exata em nenhuma outra língua. Linguistas e filósofos consideram uma das palavras mais difíceis de traduzir do mundo. É um dos elementos centrais da identidade cultural brasileira e portuguesa, mas ganhou dimensão própria no Brasil com o fado, a bossa nova e a MPB."},
];

const ACHIEVEMENTS=[
  {id:"first",icon:"🌱",label:"Primeiro Passo",desc:"Respondeu a primeira pergunta",cond:s=>s.total>=1},
  {id:"streak5",icon:"🔥",label:"Em Chamas",desc:"5 acertos seguidos",cond:s=>s.streak>=5},
  {id:"fast",icon:"⚡",label:"Velocista",desc:"Acertou em menos de 3 segundos",cond:s=>s.lastTime<=3&&s.lastOk},
  {id:"perfect10",icon:"⭐",label:"Dez Perfeitos",desc:"10 acertos sem errar",cond:s=>s.streak>=10},
  {id:"scholar",icon:"🎓",label:"Sábio do Brasil",desc:"80% de acertos",cond:s=>s.total>=10&&(s.correct/s.total)>=0.8},
  {id:"hard3",icon:"💎",label:"Corajoso",desc:"3 questões difíceis acertadas",cond:s=>s.hardCorrect>=3},
];

// ===== ESTADO =====
let playerName="",queue=[],current=null,answered=false;
let score=0,correct=0,streak=0,maxStreak=0,total=0,combo=0,hardCorrect=0;
let timeLeft=0,timerMax=0,timerInt=null,lastTime=0,lastOk=false;
let unlockedAch=[];
try{unlockedAch=JSON.parse(localStorage.getItem("bcAch3")||"[]");}catch{}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ===== BOLHAS =====
let bubbleInt=null;
function resetBubbles(){
  clearInterval(bubbleInt);
  const wrap=document.getElementById('bubble-wrap');
  wrap.innerHTML='';
  // Emite bolhinhas periódicas enquanto o timer corre
  bubbleInt=setInterval(()=>{
    spawnBubble(wrap,'rise');
  },600);
}
function spawnBubble(wrap,type){
  const wrapW=wrap.offsetWidth||300;
  const b=document.createElement('span');
  b.className='bubble';
  const sz=type==='burst'? (8+Math.random()*10) : (4+Math.random()*6);
  b.style.width=sz+'px';
  b.style.height=sz+'px';
  b.style.left=Math.random()*Math.max(1,wrapW-sz)+'px';
  const dur=type==='burst'? (0.6+Math.random()*0.4) : (0.8+Math.random()*0.6);
  b.style.animation=(type==='burst'?'bubbleBurst':'bubbleRise')+' '+dur.toFixed(2)+'s ease-out forwards';
  wrap.appendChild(b);
  setTimeout(()=>b.remove(), dur*1000+100);
}
function burstBubbles(){
  clearInterval(bubbleInt);
  const wrap=document.getElementById('bubble-wrap');
  // Dispara várias bolhas de uma vez simulando fuga
  for(let i=0;i<12;i++){
    setTimeout(()=>spawnBubble(wrap,'burst'), i*60);
  }
}

// ===== JOGO =====
function startGame(){
  const n=document.getElementById('name-in').value.trim();
  if(!n){document.getElementById('name-in').focus();return;}
  playerName=n;
  const q=shuffle(QUESTIONS).slice(0,TOTAL_QS);
  queue=q.slice(1);current=q[0];
  answered=false;score=0;correct=0;streak=0;maxStreak=0;total=0;combo=0;hardCorrect=0;
  showScreen('game');
  renderQ();
}

function renderQ(){
  const done=TOTAL_QS-queue.length-1;
  document.getElementById('q-count').textContent='Pergunta '+(done+1)+' de '+TOTAL_QS;
  document.getElementById('g-score').textContent=score;
  document.getElementById('g-streak').textContent=streak>=3?'🔥×'+streak:'';
  document.getElementById('g-prog').style.width=Math.round((done/TOTAL_QS)*100)+'%';

  const db=document.getElementById('diff-b');
  db.textContent=DIFF_LABEL[current.diff];
  db.className='diff-badge d-'+current.diff;
  const cb=document.getElementById('cat-b');
  cb.textContent=current.cat;cb.style.background=CAT_COLORS[current.cat]||'#2d6a4f';
  document.getElementById('type-lbl').textContent=current.type==='tf'?'· Verdadeiro ou Falso':'· Múltipla escolha';
  document.getElementById('q-txt').textContent=current.q;

  document.getElementById('tf-area').style.display='none';
  document.getElementById('mc-area').style.display='none';
  document.getElementById('exp-box').style.display='none';
  document.getElementById('btn-next').style.display='none';

  const tt=document.getElementById('tf-true'),tf=document.getElementById('tf-false');
  tt.className='ans-btn';tt.disabled=false;
  tf.className='ans-btn';tf.disabled=false;

  if(current.type==='tf'){
    document.getElementById('tf-area').style.display='grid';
  } else {
    const mc=document.getElementById('mc-area');
    mc.style.display='flex';mc.innerHTML='';
    const L=['A','B','C','D'];
    current.opts.forEach((o,i)=>{
      const b=document.createElement('button');b.className='ans-btn';b.dataset.idx=i;
      b.innerHTML='<span class="mc-letter" id="ml'+i+'">'+L[i]+'</span>'+o;
      b.onclick=()=>answerMC(i);mc.appendChild(b);
    });
  }

  resetBubbles();
  timerMax=DIFF_TIME[current.diff];timeLeft=timerMax;
  clearInterval(timerInt);updateTimer();
  timerInt=setInterval(()=>{
    timeLeft=Math.max(0,timeLeft-0.1);
    updateTimer();
    if(timeLeft<=0){clearInterval(timerInt);timeExpired();}
  },100);
}

function updateTimer(){
  const pct=Math.max(0,(timeLeft/timerMax)*100);
  const bar=document.getElementById('t-bar');
  bar.style.width=pct+'%';
  bar.style.background=pct>50?'#009c3b':pct>25?'#ffa000':'#dc3232';
  const v=document.getElementById('t-val');
  v.textContent=Math.ceil(timeLeft)+'s';
  v.style.color=pct>50?'#a8d5b5':pct>25?'#ffd070':'#ff7070';

}

function timeExpired(){
  if(answered)return;
  burstBubbles();
  // Pequeno delay para a animação aparecer antes de processar
  setTimeout(()=>processAns(false,-1),800);
}

function answerTF(val){
  if(answered)return;clearInterval(timerInt);
  const isOk=val===current.ans;
  const tt=document.getElementById('tf-true'),tf=document.getElementById('tf-false');
  tt.disabled=true;tf.disabled=true;
  if(current.ans===true)tt.classList.add('ans-correct');else tf.classList.add('ans-correct');
  if(val!==current.ans)(val===true?tt:tf).classList.add('ans-wrong');
  processAns(isOk,val);
}

function answerMC(idx){
  if(answered)return;clearInterval(timerInt);
  const isOk=idx===current.ans;
  document.querySelectorAll('#mc-area .ans-btn').forEach(b=>{
    b.disabled=true;const i=parseInt(b.dataset.idx);
    if(i===current.ans){b.classList.add('ans-correct');const ml=document.getElementById('ml'+i);if(ml)ml.classList.add('ml-correct');}
    else if(i===idx&&!isOk)b.classList.add('ans-wrong');
  });
  processAns(isOk,idx);
}

function processAns(isOk,choice){
  answered=true;
  const elapsed=timerMax-timeLeft;lastTime=elapsed;lastOk=isOk;
  total++;
  streak=isOk?streak+1:0;combo=isOk?combo+1:0;
  maxStreak=Math.max(maxStreak,streak);
  if(isOk){correct++;if(current.diff==='hard')hardCorrect++;}

  let pts=0;
  if(isOk){
    const base=DIFF_PTS[current.diff];
    const timePct=Math.max(0,timeLeft/timerMax);
    const timeBonus=Math.round(base*timePct*0.5);
    const comboBonus=combo>=3?Math.floor(combo/3)*5:0;
    pts=base+timeBonus+comboBonus;score+=pts;
  }

  document.getElementById('g-score').textContent=score;
  document.getElementById('g-streak').textContent=streak>=3?'🔥×'+streak:'';

  const eb=document.getElementById('exp-box');
  eb.className='exp-box '+(isOk?'exp-ok':'exp-bad');eb.style.display='block';
  let title=isOk?'✅ Correto! +'+pts+' pts':'❌ '+(choice===-1?'Tempo esgotado! O peixe fugiu com a isca 🐟':'Incorreto');
  if(combo>=3&&isOk)title+=' (combo 🔥)';
  document.getElementById('exp-title').textContent=title;
  document.getElementById('exp-text').textContent=current.exp;
  document.getElementById('btn-next').style.display='block';
  document.getElementById('btn-next').textContent=queue.length===0?'Ver resultado →':'Próxima pergunta →';

  checkAch({total,correct,streak,lastTime:elapsed,lastOk:isOk,hardCorrect});
}

function nextQuestion(){
  if(queue.length===0){showResult();return;}
  current=queue[0];queue=queue.slice(1);answered=false;renderQ();
}

function showResult(){
  saveToFirebase({
    name:playerName,score,correct,total,maxStreak,
    date:new Date().toLocaleDateString('pt-BR')
  });
  const pct=Math.round((correct/total)*100);
  document.getElementById('res-medal').textContent=pct>=90?'🏆':pct>=70?'🥈':pct>=50?'🥉':'🌱';
  document.getElementById('res-sub').textContent=playerName+', você completou as '+TOTAL_QS+' perguntas!';
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-corr').textContent=correct+'/'+total;
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-streak').textContent=maxStreak;
  showScreen('result');
}

function playAgain(){document.getElementById('name-in').value=playerName;showScreen('home');}

function confirmHome(){
  if(!answered&&total>0){if(!confirm('Sair agora? Seu progresso será perdido.'))return;}
  clearInterval(timerInt);showScreen('home');
}

// ===== RANKING GLOBAL =====
async function showRanking(){
  showScreen('ranking');
  document.getElementById('rank-list').innerHTML='<div class="rank-status">Carregando ranking global...</div>';
  const rows=await loadFromFirebase();
  const el=document.getElementById('rank-list');
  if(!rows.length){el.innerHTML='<div class="rank-status">Nenhuma partida ainda. Seja o primeiro!</div>';return;}
  const M=['🥇','🥈','🥉'];
  const RC=['rk-gold','rk-silver','rk-bronze','rk-normal'];
  el.innerHTML=rows.map((e,i)=>`
    <div class="rank-row ${RC[Math.min(i,3)]}">
      <span class="rank-pos">${M[i]||(i+1)+'º'}</span>
      <div style="flex:1">
        <div class="rank-name">${(e.name||'?').substring(0,20)}</div>
        <div class="rank-detail">${e.correct||0}/${e.total||20} acertos · seq.${e.maxStreak||0} · ${e.date||''}</div>
      </div>
      <span class="rank-pts">${e.score} pts</span>
    </div>
  `).join('');
}

// ===== CONQUISTAS =====
function checkAch(s){
  ACHIEVEMENTS.forEach(a=>{
    if(!unlockedAch.includes(a.id)&&a.cond(s)){
      unlockedAch.push(a.id);
      try{localStorage.setItem("bcAch3",JSON.stringify(unlockedAch));}catch{}
      showToast(a);
    }
  });
}
let toastT=null;
function showToast(a){
  document.getElementById('ach-ic').textContent=a.icon;
  document.getElementById('ach-name').textContent=a.label;
  document.getElementById('ach-desc').textContent=a.desc;
  const t=document.getElementById('ach-toast');t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3200);
}

document.getElementById('name-in').addEventListener('keydown',e=>{if(e.key==='Enter')startGame();});
</script>
